<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Try-On - 專題穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff; overflow-x: hidden; }
        .vto-container { aspect-ratio: 3/4; position: relative; overflow: hidden; border-radius: 24px; background: #000; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        #video-element, #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        .active-tab { color: #1a1a1a; font-weight: 700; border-bottom: 2px solid #1a1a1a; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .swatch-item.active .swatch-circle { border: 2px solid #1a1a1a; padding: 2px; transform: scale(1.1); background-clip: content-box; }
        .option-btn { border: 1px solid #eee; padding: 10px; border-radius: 12px; font-size: 11px; transition: 0.2s; background: #fff; }
        .option-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        .scan-line { position: absolute; top: 0; width: 100%; height: 2px; background: #1a1a1a; box-shadow: 0 0 15px #1a1a1a; animation: scan 2s linear infinite; display: none; z-index: 20; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="text-gray-600">

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative" id="main-app">
        
        <div id="start-screen" class="absolute inset-0 z-[100] bg-white flex flex-col items-center justify-center p-10 text-center transition-all duration-700">
            <h2 class="text-2xl font-bold text-black tracking-tighter mb-4">AI BEAUTY<br>PERSONAL ADVISOR</h2>
            <p class="text-xs text-gray-400 mb-12 tracking-widest">智能試妝與個人化推薦系統</p>
            <button id="init-btn" class="bg-black text-white px-12 py-4 rounded-full font-bold shadow-xl hover:scale-105 transition">開啟智慧鏡頭</button>
        </div>

        <header class="p-6 text-center">
            <h1 class="text-xs font-black tracking-[0.3em] uppercase text-black">AI Try-On Plugin</h1>
        </header>

        <main id="app-content" class="flex-grow px-6 opacity-0 transition-opacity duration-1000 overflow-y-auto pb-10">
            <div class="vto-container relative">
                <div id="loading-overlay" class="absolute inset-0 z-50 bg-white flex flex-col items-center justify-center">
                    <div class="w-6 h-6 border-2 border-gray-100 border-t-black rounded-full animate-spin"></div>
                </div>

                <div id="scan-bar" class="scan-line"></div>
                <video id="video-element" class="mirror" playsinline muted autoplay></video>
                <canvas id="output-canvas" class="mirror"></canvas>

                <button id="ai-analyze-btn" class="absolute top-4 right-4 z-30 bg-white/90 backdrop-blur p-3 rounded-full shadow-lg border border-gray-100 active:scale-90 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-black" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </button>
            </div>

            <div id="ai-result-panel" class="hidden mt-4 p-4 bg-gray-50 rounded-2xl border border-gray-100 transition-all">
                <h4 class="text-[10px] font-bold text-black mb-1 uppercase tracking-widest">AI 膚色分析報告</h4>
                <p id="ai-analysis-text" class="text-xs leading-relaxed text-gray-500 italic">分析中...</p>
            </div>

            <div class="mt-6">
                <div class="flex space-x-6 mb-4 text-[10px] tracking-widest overflow-x-auto no-scrollbar border-b border-gray-50">
                    <button onclick="changeUIMode('lip')" id="tab-lip" class="pb-2 active-tab whitespace-nowrap">唇妝</button>
                    <button onclick="changeUIMode('eye')" id="tab-eye" class="pb-2 whitespace-nowrap">眼妝</button>
                    <button onclick="changeUIMode('blush')" id="tab-blush" class="pb-2 whitespace-nowrap">腮紅</button>
                    <button onclick="changeUIMode('base')" id="tab-base" class="pb-2 whitespace-nowrap">底妝</button>
                </div>

                <div class="min-h-[120px]">
                    <div id="lip-panel" class="block">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="lip-selector"></div>
                    </div>
                    <div id="eye-panel" class="hidden">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="eye-selector"></div>
                    </div>
                    <div id="blush-panel" class="hidden">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="blush-selector"></div>
                    </div>
                    <div id="base-panel" class="hidden grid grid-cols-3 gap-2">
                        <button onclick="setBaseStyle('natural')" id="base-natural" class="option-btn active">輕透</button>
                        <button onclick="setBaseStyle('matte')" id="base-matte">柔霧</button>
                        <button onclick="setBaseStyle('glow')" id="base-glow">水光</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-6">
            <button id="cart-btn" class="w-full bg-black text-white py-4 rounded-2xl font-bold text-[10px] tracking-[0.2em] shadow-xl">加入購物清單</button>
        </footer>
    </div>

    <script>
        const videoElement = document.getElementById('video-element');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const appContent = document.getElementById('app-content');
        const analyzeBtn = document.getElementById('ai-analyze-btn');
        const aiText = document.getElementById('ai-analysis-text');
        const scanBar = document.getElementById('scan-bar');

        // 已更換為你的 API Key
        const apiKey = "AIzaSyB4q6e7xlc9LFluhpkuzXXdrRfSn4tGPb8"; 

        let activeLipColor = null, activeLipId = null;
        let activeEyeColor = null, activeEyeId = null;
        let activeBlushColor = null, activeBlushId = null;
        let currentBaseStyle = 'natural';
        let showMakeup = true;

        const looks = [
            { id: 'ginger', name: '柔薑', lip: '#A95842', eye: '#8B6A5A', blush: '#D5A893' },
            { id: 'rose', name: '玫瑰', lip: '#B25F60', eye: '#967A7A', blush: '#C89B9B' },
            { id: 'nut', name: '烤栗', lip: '#8B4232', eye: '#7A5E4E', blush: '#B88F7F' },
            { id: 'tea', name: '奶茶', lip: '#B26D57', eye: '#917869', blush: '#D2AF9D' },
            { id: 'berry', name: '莓果', lip: '#8E4B56', eye: '#7A646E', blush: '#B78F98' }
        ];

        async function performAIAnalysis() {
            try {
                analyzeBtn.disabled = true;
                scanBar.style.display = 'block';
                document.getElementById('ai-result-panel').classList.remove('hidden');
                aiText.innerText = "智慧掃描中，請保持不動...";

                // 擷取並壓縮影像
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 300; tempCanvas.height = 400;
                tempCanvas.getContext('2d').drawImage(videoElement, 0, 0, 300, 400);
                const base64Image = tempCanvas.toDataURL('image/jpeg', 0.5).split(',')[1];

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "你是彩妝專家。分析圖片人物膚色，從以下 ID 中選一個最合適的推薦: " + JSON.stringify(looks.map(l=>l.id)) + "。請回傳 JSON: {\"skin\":\"...\",\"id\":\"...\",\"reason\":\"...\"}" },
                            { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                        ] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const result = await response.json();
                const data = JSON.parse(result.candidates[0].content.parts[0].text);
                
                // 自動套用推薦
                const look = looks.find(l => l.id === data.id) || looks[0];
                activeLipColor = look.lip; activeLipId = look.id;
                activeEyeColor = look.eye; activeEyeId = look.id;
                activeBlushColor = look.blush; activeBlushId = look.id;
                
                aiText.innerHTML = `檢測到：<span class="text-black font-bold">${data.skin}</span><br>推薦方案：${look.name}<br><span class="text-[9px]">${data.reason}</span>`;
                refreshSwatches();

            } catch (e) {
                console.error(e);
                aiText.innerText = "分析失敗，請確保光線充足並重試。";
            } finally {
                scanBar.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }

        analyzeBtn.addEventListener('click', performAIAnalysis);

        // 介面初始化
        function initUI() {
            ['lip', 'eye', 'blush'].forEach(type => {
                const container = document.getElementById(`${type}-selector`);
                container.innerHTML = looks.map(l => `
                    <div class="swatch-item flex-shrink-0 text-center ${type}-swatch" data-id="${l.id}" onclick="selectColor('${type}', '${l.id}')">
                        <div class="swatch-circle w-12 h-12 rounded-full mx-auto mb-2 border-2 border-transparent" style="background-color: ${l[type === 'lip' ? 'lip' : (type === 'eye' ? 'eye' : 'blush')]}"></div>
                        <p class="text-[8px]">${l.name}</p>
                    </div>
                `).join('');
            });
        }

        function selectColor(type, id) {
            const look = looks.find(l => l.id === id);
            if (type === 'lip') { activeLipColor = look.lip; activeLipId = id; }
            if (type === 'eye') { activeEyeColor = look.eye; activeEyeId = id; }
            if (type === 'blush') { activeBlushColor = look.blush; activeBlushId = id; }
            refreshSwatches();
        }

        function refreshSwatches() {
            document.querySelectorAll('.swatch-item').forEach(el => {
                const id = el.dataset.id;
                if (el.classList.contains('lip-swatch')) el.classList.toggle('active', id === activeLipId);
                if (el.classList.contains('eye-swatch')) el.classList.toggle('active', id === activeEyeId);
                if (el.classList.contains('blush-swatch')) el.classList.toggle('active', id === activeBlushId);
            });
        }

        function changeUIMode(mode) {
            ['lip', 'eye', 'blush', 'base'].forEach(m => {
                const p = document.getElementById(`${m}-panel`);
                if (p) p.style.display = (m === mode) ? (m === 'base' ? 'grid' : 'block') : 'none';
                const t = document.getElementById(`tab-${m}`);
                if (t) t.classList.toggle('active-tab', m === mode);
            });
        }

        function setBaseStyle(s) {
            currentBaseStyle = s;
            document.querySelectorAll('#base-panel button').forEach(b => b.classList.toggle('active', b.id === `base-${s}`));
        }

        function onResults(results) {
            document.getElementById('loading-overlay').style.display = 'none';
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (showMakeup && results.multiFaceLandmarks?.[0]) {
                const landmarks = results.multiFaceLandmarks[0];
                // 簡易渲染示範 (保留你原本的 draw 函式邏輯)
                if (activeLipColor) {
                    drawLayer(landmarks, [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78], activeLipColor, 0.5, 5);
                    drawLayer(landmarks, [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78], activeLipColor, 0.5, 5);
                }
                if (activeBlushColor) {
                    [landmarks[205], landmarks[425]].forEach(pt => {
                        canvasCtx.globalAlpha = 0.3; canvasCtx.filter = 'blur(15px)';
                        canvasCtx.fillStyle = activeBlushColor; canvasCtx.beginPath();
                        canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 40, 0, Math.PI*2); canvasCtx.fill();
                    });
                }
            }
        }

        function drawLayer(landmarks, indices, color, alpha, blur) {
            canvasCtx.save(); canvasCtx.globalAlpha = alpha; canvasCtx.filter = `blur(${blur}px)`;
            canvasCtx.fillStyle = color; canvasCtx.beginPath();
            const pts = indices.map(i => landmarks[i]);
            canvasCtx.moveTo(pts[0].x * canvasElement.width, pts[0].y * canvasElement.height);
            pts.forEach(p => canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height));
            canvasCtx.fill(); canvasCtx.restore();
        }

        initBtn.addEventListener('click', () => {
            startScreen.style.opacity = '0'; appContent.style.opacity = '1';
            setTimeout(() => {
                startScreen.style.display = 'none';
                const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
                faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
                faceMesh.onResults(onResults);
                new Camera(videoElement, { onFrame: async () => await faceMesh.send({ image: videoElement }), width: 640, height: 480 }).start();
            }, 700);
        });

        initUI();
    </script>
</body>
</html>
