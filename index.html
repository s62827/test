<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Try-On Plugin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; background-color: #fff; }
        .vto-container { aspect-ratio: 3/4; position: relative; overflow: hidden; border-radius: 20px; background: #fff; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); }
        #video-element, #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        .active-tab { color: #1a1a1a; font-weight: 700; border-bottom: 2px solid #1a1a1a; }
        .swatch-scroll-wrap { position: relative; }
        .swatch-scroll-wrap::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 32px; background: linear-gradient(to right, transparent, white); pointer-events: none; }
        .no-scrollbar { -webkit-overflow-scrolling: touch; }
        .swatch-item.active .swatch-circle { border: 2px solid #1a1a1a; padding: 2px; background-clip: content-box; transform: scale(1.1); }
        .option-btn { border: 1px solid #F3E8F0; padding: 10px 4px; border-radius: 12px; font-size: 11px; transition: all 0.2s; text-align: center; background: white; }
        .option-btn.active { background-color: #1a1a1a; color: #fff; border-color: #1a1a1a; }
        #start-screen { background-color: #fff; z-index: 100; }
        .btn-primary { background-color: #1a1a1a; transition: transform 0.2s ease; }
        .btn-primary:active { transform: scale(0.95); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #1a1a1a, transparent); box-shadow: 0 0 15px #1a1a1a; animation: scan 2s linear infinite; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #loading-overlay { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="text-[#5d5d5d]">

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">

    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-700">
        <h2 class="text-[#1a1a1a] text-xl font-bold mb-20 tracking-wider uppercase">AI Beauty Try-On Plugin</h2>
        <div class="bg-stone-50 p-6 rounded-[2rem] text-left mb-10 border border-stone-100 shadow-sm">
            <p class="text-sm font-bold mb-4 text-stone-800">為了確保「自然服貼」效果，請注意：</p>
            <div class="space-y-3 text-xs text-stone-500">
                <p>1. 💡 正確燈光：請面向光源，確保光線充足。</p>
                <p>2. ❗ 避免濃妝：建議素顏或淡妝使用，以確保最佳體驗。</p>
            </div>
        </div>
        <button id="init-btn" class="btn-primary text-white px-10 py-4 rounded-full text-lg font-bold shadow-lg mb-6">開啟鏡頭並開始試妝</button>
        <p class="text-gray-400 text-sm">* 點擊即表示允許瀏覽器存取攝影機</p>
    </div>

    <header class="p-5 text-center bg-[#fff]">
        <h1 class="text-sm font-bold tracking-[0.2em] uppercase text-[#333]">AI Beauty Try-On Plugin</h1>
        <div class="h-px w-8 bg-[#1a1a1a] mx-auto mt-2 opacity-30"></div>
        <p class="text-[9px] text-[#1a1a1a] mt-2 tracking-[0.2em] uppercase font-bold italic">Smart Analysis System</p>
    </header>

    <main id="app-content" class="flex-grow px-6 opacity-0 transition-opacity duration-1000 overflow-y-auto pb-10">
        <div class="vto-container mt-4 relative border border-gray-100">
            <div id="loading-overlay" class="absolute inset-0 z-50 bg-white/90 flex flex-col items-center justify-center">
                <div class="w-8 h-8 border-2 border-gray-200 border-t-[#1a1a1a] rounded-full animate-spin"></div>
                <p class="text-[10px] mt-4 tracking-widest text-[#1a1a1a] font-bold uppercase">AI Scanning...</p>
            </div>
            <div id="scan-bar" class="scan-line z-20"></div>
            <video id="video-element" class="mirror" playsinline muted autoplay></video>
            <canvas id="output-canvas" class="mirror"></canvas>
            <div class="absolute top-4 right-4 z-30">
                <button id="ai-analyze-btn" class="bg-white/90 backdrop-blur-md p-3 rounded-full shadow-lg border border-gray-200 flex items-center justify-center group active:scale-90 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#1a1a1a] group-hover:rotate-12 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                    </svg>
                    <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 ease-in-out text-[10px] font-bold ml-2 text-[#1a1a1a]">AI 智慧分析推薦</span>
                </button>
            </div>
            <div class="absolute bottom-6 left-6 right-6 flex justify-between items-center z-10">
                <button id="compare-btn" class="w-10 h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-[#333] text-[9px] shadow-sm border border-white active:scale-95 transition">對比</button>
                <button id="guide-toggle" class="w-10 h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-[#333] text-[9px] shadow-sm border border-white active:scale-95 transition">比例</button>
            </div>
        </div>

        <div id="ai-result-panel" class="hidden mt-6 p-4 bg-gray-50/50 rounded-2xl border border-gray-200">
            <div class="flex items-start mb-2">
                <div class="p-2 bg-white rounded-lg mr-3 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#1a1a1a]" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="flex-grow">
                    <h4 class="text-xs font-bold text-gray-800">AI 智能分析報告</h4>
                    <p id="ai-analysis-text" class="text-[10px] text-gray-500 mt-1 leading-relaxed">正在解析...</p>
                </div>
            </div>
        </div>

        <div class="mt-6">
            <div class="flex space-x-5 mb-5 text-gray-400 text-[10px] tracking-widest overflow-x-auto no-scrollbar border-b border-gray-100">
                <button onclick="changeUIMode('lip')" id="tab-lip" class="pb-2 active-tab whitespace-nowrap uppercase">唇妝</button>
                <button onclick="changeUIMode('base')" id="tab-base" class="pb-2 whitespace-nowrap uppercase">底妝質感</button>
                <button onclick="changeUIMode('eye')" id="tab-eye" class="pb-2 whitespace-nowrap uppercase">眼影效果</button>
            </div>
            <div class="min-h-[140px]">
                <div id="lip-panel" class="block">
                    <div class="swatch-scroll-wrap">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="lip-selector" style="flex-wrap:nowrap; min-width:0;"></div>
                    </div>
                </div>
                <div id="base-panel" class="hidden">
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setBaseStyle('natural')" id="base-natural" class="option-btn active uppercase">輕透原生</button>
                        <button onclick="setBaseStyle('matte')" id="base-matte" class="option-btn uppercase">絲絨柔霧</button>
                        <button onclick="setBaseStyle('glow')" id="base-glow" class="option-btn uppercase">貴婦水光</button>
                    </div>
                </div>
                <div id="eye-panel" class="hidden">
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setEyeStyle('daily')" id="eye-daily" class="option-btn active uppercase">日常深邃</button>
                        <button onclick="setEyeStyle('rose')" id="eye-rose" class="option-btn uppercase">燕麥玫瑰</button>
                        <button onclick="setEyeStyle('tea')" id="eye-tea" class="option-btn uppercase">炭焙拿鐵</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-6 pt-2 bg-white border-t border-gray-50">
        <button id="cart-btn" class="w-full bg-[#1a1a1a] text-white py-4 rounded-xl font-bold text-[11px] tracking-[0.3em] uppercase shadow-lg shadow-gray-200">加入購物清單</button>
    </footer>
</div>

<div id="cart-screen" class="hidden max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl">
    <header class="p-5 bg-white border-b border-gray-100 flex items-center relative">
        <button id="cart-back-btn" class="flex items-center gap-1 text-xs font-bold tracking-wider text-[#1a1a1a] active:scale-95 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            返回
        </button>
        <div class="flex-grow text-center">
            <h1 class="text-sm font-bold tracking-[0.2em] uppercase text-[#333]">購物清單</h1>
            <p class="text-[9px] text-[#1a1a1a] mt-1 tracking-[0.2em] uppercase font-bold italic">My Selection</p>
        </div>
        <div class="w-12"></div>
    </header>
    <main class="flex-grow overflow-y-auto px-6 py-6">
        <div id="cart-empty" class="flex flex-col items-center justify-center h-60 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-gray-200 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <p class="text-xs text-gray-400 tracking-wider">尚未選擇任何產品</p>
            <p class="text-[10px] text-gray-300 mt-1">請回到試妝頁面選擇妝容</p>
        </div>
        <div id="cart-items" class="space-y-3"></div>
        <div id="cart-summary" class="hidden mt-6 p-4 bg-gray-50 rounded-2xl border border-gray-100">
            <h3 class="text-[10px] font-bold tracking-widest uppercase text-gray-400 mb-3">訂單摘要</h3>
            <div class="space-y-2">
                <div class="flex justify-between text-xs text-gray-600"><span>商品小計</span><span id="subtotal-price">NT$ 0</span></div>
                <div class="flex justify-between text-xs text-gray-600"><span>運費</span><span class="text-green-600 font-bold">免費</span></div>
                <div class="h-px bg-gray-200 my-2"></div>
                <div class="flex justify-between text-sm font-bold text-[#1a1a1a]"><span>總計</span><span id="total-price">NT$ 0</span></div>
            </div>
        </div>
    </main>
    <footer class="p-6 pt-2 bg-white border-t border-gray-50 space-y-2">
        <button class="w-full bg-[#1a1a1a] text-white py-4 rounded-xl font-bold text-[11px] tracking-[0.3em] uppercase shadow-lg shadow-gray-200">立即結帳</button>
        <button id="cart-back-btn2" class="w-full border border-gray-200 text-[#1a1a1a] py-3 rounded-xl font-bold text-[11px] tracking-[0.3em] uppercase active:scale-95 transition">繼續選購</button>
    </footer>
</div>

<script>
    const videoElement   = document.getElementById('video-element');
    const canvasElement  = document.getElementById('output-canvas');
    const canvasCtx      = canvasElement.getContext('2d');
    const loadingOverlay = document.getElementById('loading-overlay');
    const startScreen    = document.getElementById('start-screen');
    const appContent     = document.getElementById('app-content');
    const initBtn        = document.getElementById('init-btn');
    const compareBtn     = document.getElementById('compare-btn');
    const analyzeBtn     = document.getElementById('ai-analyze-btn');
    const scanBar        = document.getElementById('scan-bar');
    const aiPanel        = document.getElementById('ai-result-panel');
    const aiText         = document.getElementById('ai-analysis-text');

    const apiKey = "AIzaSyB4q6e7xlc9LFluhpkuzXXdrRfSn4tGPb8";

    let currentBaseStyle = 'natural';
    let currentEyeStyle  = 'daily';
    let showMakeup = true;
    let showGuides = false;

    const looks = [
        { id: 'ginger', name: '01 柔薑',     lip: '#A95842', eye: '#8B6A5A', blush: '#D5A893' },
        { id: 'rose',   name: '02 燕麥玫瑰', lip: '#B25F60', eye: '#967A7A', blush: '#C89B9B' },
        { id: 'nut',    name: '03 烤栗子',   lip: '#8B4232', eye: '#7A5E4E', blush: '#B88F7F' },
        { id: 'tea',    name: '04 肉桂奶茶', lip: '#B26D57', eye: '#917869', blush: '#D2AF9D' },
        { id: 'berry',  name: '05 煙燻莓果', lip: '#8E4B56', eye: '#7A646E', blush: '#B78F98' },
        { id: 'honey',  name: '06 蜜糖橘',   lip: '#C26949', eye: '#A68364', blush: '#E5B198' },
        { id: 'cocoa',  name: '07 慕斯可可', lip: '#6D3D32', eye: '#665248', blush: '#A38475' }
    ];

    let activeLipColor = null;
    let activeLipId    = null;

    const UPPER_LIP = [61,185,40,39,37,0,267,269,270,409,291,308,415,310,311,312,13,82,81,80,191,78];
    const LOWER_LIP = [61,146,91,181,84,17,314,405,321,375,291,308,324,318,402,317,14,87,178,88,95,78];
    const FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];

    function tryExtractJson(text) {
        try { return JSON.parse(text); } catch(e) {
            var m = text.match(/\{[\s\S]*\}/);
            if (m) { try { return JSON.parse(m[0]); } catch(e2) { return null; } }
            return null;
        }
    }

    async function performAIAnalysis() {
        try {
            analyzeBtn.disabled = true;
            scanBar.style.display = 'block';
            aiPanel.classList.remove('hidden');
            aiText.innerText = "智慧分析推薦中，請稍候...";

            var targetWidth = 480;
            var scale = targetWidth / videoElement.videoWidth;
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width  = targetWidth;
            tempCanvas.height = videoElement.videoHeight * scale;
            var tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
            var base64Image = tempCanvas.toDataURL('image/jpeg', 0.7).split(',')[1];

            var lookList = JSON.stringify(looks.map(function(l){ return {id: l.id, name: l.name}; }));
            var systemPrompt = "You are a professional makeup AI. Analyze the skin tone and face shape of the user. Pick ONE ideal color from this list: " + lookList + ". Return ONLY a JSON object with keys: skin_tone, face_shape, recommended_id, advice. No markdown, no extra text.";

            var retries  = 0;
            var finalData = null;

            while (retries < 3 && !finalData) {
                try {
                    var response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            contents: [{ parts: [
                                { text: "Please analyze my face features and recommend a makeup look. Return only JSON." },
                                { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                            ]}],
                            generationConfig: { temperature: 0.1, maxOutputTokens: 300 }
                        })
                    });

                    if (!response.ok) {
                        var errorData = await response.json();
                        if (response.status === 429 || response.status === 503) {
                            retries++;
                            await new Promise(function(r){ setTimeout(r, 2000 * retries); });
                            continue;
                        }
                        throw new Error("API 錯誤 " + response.status);
                    }

                    var result = await response.json();
                    var text   = result.candidates && result.candidates[0] && result.candidates[0].content && result.candidates[0].content.parts && result.candidates[0].content.parts[0] && result.candidates[0].content.parts[0].text;
                    if (text) { finalData = tryExtractJson(text); if (finalData) break; }
                    retries++;
                } catch(e) {
                    retries++;
                    await new Promise(function(r){ setTimeout(r, 1000 * retries); });
                }
            }

            if (!finalData) throw new Error("解析失敗，請重試");

            var recommendedLook = null;
            for (var i = 0; i < looks.length; i++) {
                if (looks[i].id === finalData.recommended_id) { recommendedLook = looks[i]; break; }
            }
            if (!recommendedLook) recommendedLook = looks[0];

            activeLipColor = recommendedLook.lip;
            activeLipId    = recommendedLook.id;
            refreshSwatches();

            aiText.innerHTML = "<strong>" + finalData.skin_tone + "</strong> | 臉型：" + finalData.face_shape + "<br>建議：" + finalData.advice + "<br><span style='color:#1a1a1a;font-weight:700'>為您推薦：" + recommendedLook.name + "</span>";

        } catch(error) {
            aiText.innerText = "分析失敗：" + error.message;
        } finally {
            scanBar.style.display = 'none';
            analyzeBtn.disabled = false;
        }
    }

    analyzeBtn.addEventListener('click', performAIAnalysis);

    function setLipColor(look) {
        if (activeLipId === look.id) { activeLipColor = null; activeLipId = null; }
        else { activeLipColor = look.lip; activeLipId = look.id; }
        refreshSwatches();
    }

    function refreshSwatches() {
        document.querySelectorAll('.lip-swatch').forEach(function(el){
            el.classList.toggle('active', el.dataset.id === activeLipId);
        });
    }

    function onResults(results) {
        if (loadingOverlay.style.opacity !== '0') {
            loadingOverlay.style.opacity = '0';
            setTimeout(function(){ loadingOverlay.style.display = 'none'; }, 500);
        }
        if (videoElement.videoWidth > 0) {
            if (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight) {
                canvasElement.width  = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }
        }
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (showMakeup && results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            var landmarks = results.multiFaceLandmarks[0];
            drawBaseMakeup(landmarks, currentBaseStyle);
            var eyeColor = currentEyeStyle === 'rose' ? '#A68A8A' : (currentEyeStyle === 'tea' ? '#8C7665' : '#8B6A5A');
            drawNaturalLayer(landmarks, [226,247,30,29,27,28,56,190,243],     eyeColor, 0.45, 12, 'multiply');
            drawNaturalLayer(landmarks, [463,414,286,258,257,259,260,467,446], eyeColor, 0.45, 12, 'multiply');
            if (activeLipColor) drawLips(landmarks, activeLipColor);
            if (showGuides) drawProportionGuides(landmarks);
        }
        canvasCtx.restore();
    }

    function drawBaseMakeup(landmarks, style) {
        if (style === 'natural') return;
        canvasCtx.save();
        var ovalPoints = FACE_OVAL.map(function(idx){ return landmarks[idx]; });
        if (style === 'matte') {
            canvasCtx.globalCompositeOperation = 'multiply';
            canvasCtx.globalAlpha = 0.08;
            canvasCtx.fillStyle = '#F5E3D5';
            canvasCtx.beginPath();
            canvasCtx.moveTo(ovalPoints[0].x * canvasElement.width, ovalPoints[0].y * canvasElement.height);
            ovalPoints.forEach(function(p){ canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height); });
            canvasCtx.fill();
        } else if (style === 'glow') {
            [1,4,168].forEach(function(idx){
                var pt   = landmarks[idx];
                var grad = canvasCtx.createRadialGradient(pt.x*canvasElement.width, pt.y*canvasElement.height, 0, pt.x*canvasElement.width, pt.y*canvasElement.height, 40);
                grad.addColorStop(0, 'rgba(255,255,255,0.15)');
                grad.addColorStop(1, 'transparent');
                canvasCtx.fillStyle = grad;
                canvasCtx.globalCompositeOperation = 'screen';
                canvasCtx.beginPath();
                canvasCtx.arc(pt.x*canvasElement.width, pt.y*canvasElement.height, 40, 0, Math.PI*2);
                canvasCtx.fill();
            });
        }
        canvasCtx.restore();
    }

    function drawLips(landmarks, color) {
        drawPath(UPPER_LIP.map(function(idx){ return landmarks[idx]; }), color, 0.4, 8, 'multiply');
        drawPath(LOWER_LIP.map(function(idx){ return landmarks[idx]; }), color, 0.4, 8, 'multiply');
    }

    function drawPath(points, color, alpha, blur, composite) {
        canvasCtx.save();
        canvasCtx.globalCompositeOperation = composite;
        canvasCtx.globalAlpha = alpha;
        canvasCtx.filter = "blur(" + blur + "px)";
        canvasCtx.fillStyle = color;
        canvasCtx.beginPath();
        canvasCtx.moveTo(points[0].x * canvasElement.width, points[0].y * canvasElement.height);
        points.forEach(function(p){ canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height); });
        canvasCtx.closePath();
        canvasCtx.fill();
        canvasCtx.restore();
    }

    function drawNaturalLayer(landmarks, indices, color, alpha, blur, composite) {
        drawPath(indices.map(function(i){ return landmarks[i]; }), color, alpha, blur, composite);
    }

    function drawProportionGuides(landmarks) {
        canvasCtx.strokeStyle = '#1a1a1a';
        canvasCtx.lineWidth = 0.8;
        canvasCtx.setLineDash([5,5]);
        [landmarks[10].y, landmarks[168].y, landmarks[2].y, landmarks[152].y].forEach(function(y){
            canvasCtx.beginPath();
            canvasCtx.moveTo(canvasElement.width * 0.2, y * canvasElement.height);
            canvasCtx.lineTo(canvasElement.width * 0.8, y * canvasElement.height);
            canvasCtx.stroke();
        });
    }

    initBtn.addEventListener('click', async function() {
        try {
            await navigator.mediaDevices.getUserMedia({ video: true });
        } catch(e) {
            alert('請允許瀏覽器存取鏡頭，並重新整理頁面');
            return;
        }
        startScreen.style.opacity = '0';
        appContent.style.opacity  = '1';
        setTimeout(function(){ startScreen.style.display = 'none'; startCamera(); }, 700);
    });

    function startCamera() {
        var faceMesh = new FaceMesh({ locateFile: function(file){ return "https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/" + file; } });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        faceMesh.onResults(onResults);
        var camera = new Camera(videoElement, {
            onFrame: async function(){ await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480, facingMode: 'user'
        });
        camera.start();
    }

    function changeUIMode(mode) {
        ['lip','base','eye'].forEach(function(m){
            var el  = document.getElementById(m + '-panel');
            var tab = document.getElementById('tab-' + m);
            if (el)  el.style.display = (m === mode) ? 'block' : 'none';
            if (tab) tab.classList.toggle('active-tab', m === mode);
        });
    }

    function setBaseStyle(style) {
        if (currentBaseStyle === style) {
            currentBaseStyle = null;
            document.querySelectorAll('#base-panel .option-btn').forEach(function(b){ b.classList.remove('active'); });
            return;
        }
        currentBaseStyle = style;
        document.querySelectorAll('#base-panel .option-btn').forEach(function(b){ b.classList.remove('active'); });
        document.getElementById('base-' + style).classList.add('active');
    }

    function setEyeStyle(style) {
        if (currentEyeStyle === style) {
            currentEyeStyle = null;
            document.querySelectorAll('#eye-panel .option-btn').forEach(function(b){ b.classList.remove('active'); });
            return;
        }
        currentEyeStyle = style;
        document.querySelectorAll('#eye-panel .option-btn').forEach(function(b){ b.classList.remove('active'); });
        document.getElementById('eye-' + style).classList.add('active');
    }

    function initUI() {
        var container = document.getElementById('lip-selector');
        looks.forEach(function(look){
            var item = document.createElement('div');
            item.className   = 'flex-shrink-0 cursor-pointer text-center swatch-item lip-swatch';
            item.dataset.id  = look.id;
            item.onclick     = function(){ setLipColor(look); };
            item.innerHTML   = '<div class="w-14 h-14 rounded-full border border-gray-200 shadow-sm mb-2 swatch-circle mx-auto" style="background:' + look.lip + '"></div><p class="text-[9px] font-bold text-gray-700">' + look.name + '</p>';
            container.appendChild(item);
        });
    }

    compareBtn.addEventListener('mousedown',  function(){ showMakeup = false; });
    compareBtn.addEventListener('mouseup',    function(){ showMakeup = true; });
    compareBtn.addEventListener('touchstart', function(e){ e.preventDefault(); showMakeup = false; });
    compareBtn.addEventListener('touchend',   function(){ showMakeup = true; });
    document.getElementById('guide-toggle').addEventListener('click', function(){ showGuides = !showGuides; });

    initUI();
</script>

<script>
    var productCatalog = {
        lip: {
            ginger: { name: '柔薑唇膏',     subtitle: 'Velvet Lip Color #01', price: 980,  tag: '唇妝' },
            rose:   { name: '燕麥玫瑰唇膏', subtitle: 'Velvet Lip Color #02', price: 980,  tag: '唇妝' },
            nut:    { name: '烤栗子唇膏',   subtitle: 'Velvet Lip Color #03', price: 980,  tag: '唇妝' },
            tea:    { name: '肉桂奶茶唇膏', subtitle: 'Velvet Lip Color #04', price: 980,  tag: '唇妝' },
            berry:  { name: '煙燻莓果唇膏', subtitle: 'Velvet Lip Color #05', price: 980,  tag: '唇妝' },
            honey:  { name: '蜜糖橘唇膏',   subtitle: 'Velvet Lip Color #06', price: 980,  tag: '唇妝' },
            cocoa:  { name: '慕斯可可唇膏', subtitle: 'Velvet Lip Color #07', price: 980,  tag: '唇妝' }
        },
        base: {
            natural: { name: '輕透原生粉底液',   subtitle: 'Skin Veil Foundation',     price: 1680, tag: '底妝' },
            matte:   { name: '絲絨柔霧氣墊',     subtitle: 'Matte Cushion Foundation', price: 1880, tag: '底妝' },
            glow:    { name: '貴婦水光精華粉底', subtitle: 'Glow Serum Foundation',    price: 2280, tag: '底妝' }
        },
        eyeStyle: {
            daily: { name: '日常深邃眼線筆', subtitle: 'Daily Liner',         price: 680, tag: '眼影' },
            rose:  { name: '燕麥玫瑰眼影膏', subtitle: 'Rose Eye Gel',        price: 780, tag: '眼影' },
            tea:   { name: '炭焙拿鐵眼影棒', subtitle: 'Tea Latte Eye Stick', price: 780, tag: '眼影' }
        }
    };

    function buildCartScreen() {
        var items = [];
        if (activeLipId)      items.push(Object.assign({}, productCatalog.lip[activeLipId],          { color: activeLipColor }));
        if (currentBaseStyle) items.push(Object.assign({}, productCatalog.base[currentBaseStyle],     { color: '#F5E3D5' }));
        if (currentEyeStyle)  items.push(Object.assign({}, productCatalog.eyeStyle[currentEyeStyle], { color: '#8B6A5A' }));

        var cartItemsEl   = document.getElementById('cart-items');
        var cartEmptyEl   = document.getElementById('cart-empty');
        var cartSummaryEl = document.getElementById('cart-summary');
        cartItemsEl.innerHTML = '';

        if (items.length === 0) {
            cartEmptyEl.style.display = 'flex';
            cartSummaryEl.classList.add('hidden');
        } else {
            cartEmptyEl.style.display = 'none';
            cartSummaryEl.classList.remove('hidden');
            var total = 0;
            items.forEach(function(item){
                total += item.price;
                var el = document.createElement('div');
                el.className = 'flex items-center gap-4 p-4 bg-white rounded-2xl border border-gray-100 shadow-sm';
                el.innerHTML =
                    '<div class="w-14 h-14 rounded-xl flex-shrink-0 shadow-sm" style="background:' + (item.color || '#ccc') + '; opacity:0.85;"></div>' +
                    '<div class="flex-grow min-w-0">' +
                        '<p class="text-[10px] font-bold tracking-widest text-gray-300 uppercase">' + item.tag + '</p>' +
                        '<p class="text-sm font-bold text-[#1a1a1a] mt-0.5 truncate">' + item.name + '</p>' +
                        '<p class="text-[10px] text-gray-400 mt-0.5">' + item.subtitle + '</p>' +
                    '</div>' +
                    '<div class="flex-shrink-0 text-right">' +
                        '<p class="text-sm font-bold text-[#1a1a1a]">NT$ ' + item.price.toLocaleString() + '</p>' +
                        '<p class="text-[9px] text-gray-300 mt-1">x 1</p>' +
                    '</div>';
                cartItemsEl.appendChild(el);
            });
            document.getElementById('subtotal-price').textContent = 'NT$ ' + total.toLocaleString();
            document.getElementById('total-price').textContent    = 'NT$ ' + total.toLocaleString();
        }
    }

    function showCartScreen() {
        buildCartScreen();
        document.querySelector('.max-w-md.mx-auto.min-h-screen').style.display = 'none';
        var cs = document.getElementById('cart-screen');
        cs.classList.remove('hidden');
        cs.scrollTop = 0;
    }

    function hideCartScreen() {
        document.getElementById('cart-screen').classList.add('hidden');
        document.querySelector('.max-w-md.mx-auto.min-h-screen').style.display = 'flex';
    }

    document.getElementById('cart-btn').addEventListener('click', showCartScreen);
    document.getElementById('cart-back-btn').addEventListener('click', hideCartScreen);
    document.getElementById('cart-back-btn2').addEventListener('click', hideCartScreen);
</script>
</body>
</html>
