    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; touch-action: manipulation; background-color: #fff; }
        .vto-container { aspect-ratio: 3/4; position: relative; overflow: hidden; border-radius: 20px; background: #fff; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); }
        #video-element, #output-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        .active-tab { color: #1a1a1a; font-weight: 700; border-bottom: 2px solid #1a1a1a; }
        .swatch-scroll-wrap { position: relative; }
        .swatch-scroll-wrap::after { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 32px; background: linear-gradient(to right, transparent, white); pointer-events: none; }
        .no-scrollbar { -webkit-overflow-scrolling: touch; }
        .swatch-item.active .swatch-circle { border: 2px solid #1a1a1a; padding: 2px; background-clip: content-box; transform: scale(1.1); }
        #start-screen { background-color: #fff; z-index: 100; }
        .btn-primary { background-color: #1a1a1a; transition: transform 0.2s ease; }
        .btn-primary:active { transform: scale(0.95); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #1a1a1a, transparent); box-shadow: 0 0 15px #1a1a1a; animation: scan 2s linear infinite; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #loading-overlay { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="text-[#5d5d5d]">

</div>

<script>
    var videoElement   = document.getElementById('video-element');
    var canvasElement  = document.getElementById('output-canvas');
    var canvasCtx      = canvasElement.getContext('2d');
    var loadingOverlay = document.getElementById('loading-overlay');
    var startScreen    = document.getElementById('start-screen');
    var appContent     = document.getElementById('app-content');
    var initBtn        = document.getElementById('init-btn');
    var compareBtn     = document.getElementById('compare-btn');
    var analyzeBtn     = document.getElementById('ai-analyze-btn');
    var scanBar        = document.getElementById('scan-bar');
    var aiPanel        = document.getElementById('ai-result-panel');
    var aiText         = document.getElementById('ai-analysis-text');

    var apiKey = "AIzaSyB4q6e7xlc9LFluhpkuzXXdrRfSn4tGPb8";
    var showMakeup = true;
    var showGuides = false;

    var lipColors = [
        { id: 'l1', name: '玫瑰裸粉', color: '#C8847A', price: 360, subtitle: 'Rose Nude' },
        { id: 'l2', name: '豆沙磚紅', color: '#A0514A', price: 360, subtitle: 'Brick Rose' },
        { id: 'l3', name: '奶茶橘棕', color: '#B8795A', price: 360, subtitle: 'Latte Brown' },
        { id: 'l4', name: '莓果紫紅', color: '#8B3A52', price: 390, subtitle: 'Berry Mauve' },
        { id: 'l5', name: '珊瑚橘紅', color: '#C96448', price: 360, subtitle: 'Coral Red' },
        { id: 'l6', name: '霧感正紅', color: '#B03030', price: 390, subtitle: 'Matte Red' },
        { id: 'l7', name: '乾燥玫瑰', color: '#9E6060', price: 360, subtitle: 'Dry Rose' }
    ];

    var eyeColors = [
        { id: 'e1', name: '大地棕',   color: '#8B6A5A', price: 550, subtitle: 'Warm Earth' },
        { id: 'e2', name: '玫瑰粉棕', color: '#967A7A', price: 550, subtitle: 'Rose Brown' },
        { id: 'e3', name: '煙燻灰',   color: '#6A6A7A', price: 580, subtitle: 'Smoky Gray' },
        { id: 'e4', name: '奶油可可', color: '#7A5E4E', price: 550, subtitle: 'Cocoa Cream' },
        { id: 'e5', name: '香檳金',   color: '#C4A882', price: 620, subtitle: 'Champagne' },
        { id: 'e6', name: '焦糖棕',   color: '#A07850', price: 550, subtitle: 'Caramel' },
        { id: 'e7', name: '霧感橄欖', color: '#7A7A5A', price: 580, subtitle: 'Olive Mist' }
    ];

    var baseColors = [
        { id: 'b1', name: '瓷白 10',  color: '#F0DFD0', price: 490, subtitle: 'Porcelain 10' },
        { id: 'b2', name: '自然 20',  color: '#E8D0B8', price: 490, subtitle: 'Natural 20' },
        { id: 'b3', name: '米膚 30',  color: '#DEC0A0', price: 490, subtitle: 'Warm Beige 30' },
        { id: 'b4', name: '蜜糖 40',  color: '#D0A880', price: 490, subtitle: 'Honey 40' },
        { id: 'b5', name: '小麥 50',  color: '#C09060', price: 490, subtitle: 'Wheat 50' },
        { id: 'b6', name: '健康 60',  color: '#A87848', price: 490, subtitle: 'Bronze 60' }
    ];

    var activeLipColor = null;  var activeLipId  = null;
    var activeEyeColor = null;  var activeEyeId  = null;
    var activeBaseColor = null; var activeBaseId = null;

    var UPPER_LIP = [61,185,40,39,37,0,267,269,270,409,291,308,415,310,311,312,13,82,81,80,191,78];
    var LOWER_LIP = [61,146,91,181,84,17,314,405,321,375,291,308,324,318,402,317,14,87,178,88,95,78];
    var FACE_OVAL = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];
    var LEFT_EYE_REGION  = [226,247,30,29,27,28,56,190,243,133,173,157,158,159,160,161,246,33,7,163,144,145,153,154,155];
    var RIGHT_EYE_REGION = [463,414,286,258,257,259,260,467,446,362,398,384,385,386,387,388,466,263,249,390,373,374,380,381,382];

    // ✅ 縮小到只有眼皮範圍，不蓋眉毛
    var LEFT_EYE_SHADOW  = [33,246,161,160,159,158,157,173,133,155,154,153,145,144,163,7];
    var RIGHT_EYE_SHADOW = [263,466,388,387,386,385,384,398,362,382,381,380,374,373,390,249];

    function hexToRgb(hex) {
        return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
    }

    function tracePath(ctx, points, W, H) {
        ctx.beginPath();
        ctx.moveTo(points[0].x * W, points[0].y * H);
        for (var i = 1; i < points.length; i++) { ctx.lineTo(points[i].x * W, points[i].y * H); }
        ctx.closePath();
    }

    function tryExtractJson(text) {
        try { return JSON.parse(text); } catch(e) {
            var m = text.match(/\{[\s\S]*\}/);
            if (m) { try { return JSON.parse(m[0]); } catch(e2) { return null; } }
            return null;
        }
    }

    async function performAIAnalysis() {
        try {
            analyzeBtn.disabled = true;
            scanBar.style.display = 'block';
            aiPanel.classList.remove('hidden');
            aiText.innerText = "智慧分析推薦中，請稍候...";

            var targetWidth = 480;
            var scale = targetWidth / videoElement.videoWidth;
            var tempCanvas = document.createElement('canvas');
            tempCanvas.width = targetWidth;
            tempCanvas.height = videoElement.videoHeight * scale;
            var tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
            var base64Image = tempCanvas.toDataURL('image/jpeg', 0.7).split(',')[1];

            var lipList  = JSON.stringify(lipColors.map(function(l){ return {id:l.id,name:l.name}; }));
            var eyeList  = JSON.stringify(eyeColors.map(function(l){ return {id:l.id,name:l.name}; }));
            var baseList = JSON.stringify(baseColors.map(function(l){ return {id:l.id,name:l.name}; }));
            var systemPrompt = "You are a professional makeup AI. Analyze the user skin tone and face. Pick ONE from each list. Lip list: " + lipList + ". Eye list: " + eyeList + ". Base list: " + baseList + ". Return ONLY JSON with keys: skin_tone, face_shape, recommended_lip_id, recommended_eye_id, recommended_base_id, advice. No markdown, no extra text.";

            var retries = 0; var finalData = null;
            while (retries < 3 && !finalData) {
                try {
                    var response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            contents: [{ parts: [
                                { text: "Analyze my face and recommend colors. Return only JSON." },
                                { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                            ]}],
                            generationConfig: { temperature: 0.1, maxOutputTokens: 300 }
                        })
                    });
                    if (!response.ok) {
                        if (response.status === 429 || response.status === 503) { retries++; await new Promise(function(r){ setTimeout(r, 2000*retries); }); continue; }
                        throw new Error("API error " + response.status);
                    }
                    var result = await response.json();
                    var txt = result.candidates && result.candidates[0] && result.candidates[0].content && result.candidates[0].content.parts && result.candidates[0].content.parts[0] && result.candidates[0].content.parts[0].text;
                    if (txt) { finalData = tryExtractJson(txt); if (finalData) break; }
                    retries++;
                } catch(e) { retries++; await new Promise(function(r){ setTimeout(r, 1000*retries); }); }
            }

            if (!finalData) throw new Error("解析失敗，請重試");

            var rLip = null; var rEye = null; var rBase = null;
            for (var i = 0; i < lipColors.length;  i++) { if (lipColors[i].id  === finalData.recommended_lip_id)  { rLip  = lipColors[i];  break; } }
            for (var i = 0; i < eyeColors.length;  i++) { if (eyeColors[i].id  === finalData.recommended_eye_id)  { rEye  = eyeColors[i];  break; } }
            for (var i = 0; i < baseColors.length; i++) { if (baseColors[i].id === finalData.recommended_base_id) { rBase = baseColors[i]; break; } }
            if (!rLip)  rLip  = lipColors[0];
            if (!rEye)  rEye  = eyeColors[0];
            if (!rBase) rBase = baseColors[0];

            activeLipColor = rLip.color; activeLipId = rLip.id;
            activeEyeColor = rEye.color; activeEyeId = rEye.id;
            activeBaseColor = rBase.color; activeBaseId = rBase.id;
            refreshAllSwatches();

            aiText.innerHTML = "<strong>" + finalData.skin_tone + "</strong> | " + finalData.face_shape + "<br>" + finalData.advice + "<br><span style='color:#1a1a1a;font-weight:700'>唇：" + rLip.name + " / 眼：" + rEye.name + " / 底：" + rBase.name + "</span>";
        } catch(error) {
            aiText.innerText = "分析失敗：" + error.message;
        } finally {
            scanBar.style.display = 'none';
            analyzeBtn.disabled = false;
        }
    }

    analyzeBtn.addEventListener('click', performAIAnalysis);

    function setLipColor(item)  { if (activeLipId  === item.id) { activeLipColor  = null; activeLipId  = null; } else { activeLipColor  = item.color; activeLipId  = item.id; } refreshAllSwatches(); }
    function setEyeColor(item)  { if (activeEyeId  === item.id) { activeEyeColor  = null; activeEyeId  = null; } else { activeEyeColor  = item.color; activeEyeId  = item.id; } refreshAllSwatches(); }
    function setBaseColor(item) { if (activeBaseId === item.id) { activeBaseColor = null; activeBaseId = null; } else { activeBaseColor = item.color; activeBaseId = item.id; } refreshAllSwatches(); }

    function refreshAllSwatches() {
        document.querySelectorAll('.lip-swatch').forEach(function(el){  el.classList.toggle('active', el.dataset.id === activeLipId);  });
        document.querySelectorAll('.eye-swatch').forEach(function(el){  el.classList.toggle('active', el.dataset.id === activeEyeId);  });
        document.querySelectorAll('.base-swatch').forEach(function(el){ el.classList.toggle('active', el.dataset.id === activeBaseId); });
    }

    function onResults(results) {
        if (loadingOverlay.style.opacity !== '0') {
            loadingOverlay.style.opacity = '0';
            setTimeout(function(){ loadingOverlay.style.display = 'none'; }, 500);
        }
        if (videoElement.videoWidth > 0) {
            if (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight) {
                canvasElement.width  = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }
        }
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (showMakeup && results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            var lm = results.multiFaceLandmarks[0];
            var W  = canvasElement.width;
            var H  = canvasElement.height;
            if (activeBaseColor) drawBase(lm, W, H, activeBaseColor);
            if (activeEyeColor)  drawEye(lm, W, H, activeEyeColor);
            if (activeLipColor)  drawLips(lm, W, H, activeLipColor);
            if (showGuides)      drawProportionGuides(lm, W, H);
        }
        canvasCtx.restore();
    }

    function drawBase(lm, W, H, hexColor) {
        var rgb = hexToRgb(hexColor);
        var off = document.createElement('canvas');
        off.width = W; off.height = H;
        var ctx = off.getContext('2d');
        ctx.save();
        ctx.filter = 'blur(20px)';
        ctx.fillStyle = 'rgba(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ',0.18)';
        tracePath(ctx, FACE_OVAL.map(function(i){ return lm[i]; }), W, H);
        ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.filter = 'blur(12px)';
        ctx.fillStyle = 'rgba(0,0,0,1)';
        tracePath(ctx, LEFT_EYE_REGION.map(function(i){ return lm[i]; }), W, H);
        ctx.fill();
        tracePath(ctx, RIGHT_EYE_REGION.map(function(i){ return lm[i]; }), W, H);
        ctx.fill();
        ctx.restore();
        canvasCtx.save();
        canvasCtx.globalCompositeOperation = 'soft-light';
        canvasCtx.globalAlpha = 0.6;
        canvasCtx.drawImage(off, 0, 0);
        canvasCtx.restore();
    }

    // ✅ 透明度調低，只蓋眼皮範圍，自然不搶眼
    function drawEye(lm, W, H, hexColor) {
        var rgb = hexToRgb(hexColor);
        var regions = [
            LEFT_EYE_SHADOW.map(function(i){ return lm[i]; }),
            RIGHT_EYE_SHADOW.map(function(i){ return lm[i]; })
        ];
        regions.forEach(function(pts) {
            canvasCtx.save();
            canvasCtx.filter = 'blur(16px)';
            canvasCtx.globalCompositeOperation = 'multiply';
            canvasCtx.globalAlpha = 0.22;
            canvasCtx.fillStyle = 'rgb(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ')';
            tracePath(canvasCtx, pts, W, H);
            canvasCtx.fill();
            canvasCtx.restore();
            canvasCtx.save();
            canvasCtx.filter = 'blur(6px)';
            canvasCtx.globalCompositeOperation = 'multiply';
            canvasCtx.globalAlpha = 0.15;
            canvasCtx.fillStyle = 'rgb(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ')';
            tracePath(canvasCtx, pts, W, H);
            canvasCtx.fill();
            canvasCtx.restore();
        });
    }

    function drawLips(lm, W, H, hexColor) {
        var rgb = hexToRgb(hexColor);
        var parts = [
            UPPER_LIP.map(function(i){ return lm[i]; }),
            LOWER_LIP.map(function(i){ return lm[i]; })
        ];
        parts.forEach(function(pts) {
            canvasCtx.save();
            canvasCtx.filter = 'blur(2px)';
            canvasCtx.globalCompositeOperation = 'multiply';
            canvasCtx.globalAlpha = 0.6;
            canvasCtx.fillStyle = 'rgb(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ')';
            tracePath(canvasCtx, pts, W, H);
            canvasCtx.fill();
            canvasCtx.restore();
            canvasCtx.save();
            canvasCtx.filter = 'blur(6px)';
            canvasCtx.globalCompositeOperation = 'multiply';
            canvasCtx.globalAlpha = 0.22;
            canvasCtx.fillStyle = 'rgb(' + rgb.r + ',' + rgb.g + ',' + rgb.b + ')';
            tracePath(canvasCtx, pts, W, H);
            canvasCtx.fill();
            canvasCtx.restore();
        });
    }

    function drawProportionGuides(lm, W, H) {
        canvasCtx.strokeStyle = '#1a1a1a'; canvasCtx.lineWidth = 0.8; canvasCtx.setLineDash([5,5]);
        [lm[10].y, lm[168].y, lm[2].y, lm[152].y].forEach(function(y){
            canvasCtx.beginPath();
            canvasCtx.moveTo(W * 0.2, y * H);
            canvasCtx.lineTo(W * 0.8, y * H);
            canvasCtx.stroke();
        });
    }

    initBtn.addEventListener('click', async function() {
        try { await navigator.mediaDevices.getUserMedia({ video: true }); }
        catch(e) { alert('請允許瀏覽器存取鏡頭，並重新整理頁面'); return; }
        startScreen.style.opacity = '0';
        appContent.style.opacity  = '1';
        setTimeout(function(){ startScreen.style.display = 'none'; startCamera(); }, 700);
    });

    function startCamera() {
        var faceMesh = new FaceMesh({ locateFile: function(file){ return "https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/" + file; } });
        faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        faceMesh.onResults(onResults);
        var camera = new Camera(videoElement, {
            onFrame: async function(){ await faceMesh.send({ image: videoElement }); },
            width: 640, height: 480, facingMode: 'user'
        });
        camera.start();
    }

    function changeUIMode(mode) {
        ['lip','eye','base'].forEach(function(m){
            var el  = document.getElementById(m + '-panel');
            var tab = document.getElementById('tab-' + m);
            if (el)  el.style.display = (m === mode) ? 'block' : 'none';
            if (tab) tab.classList.toggle('active-tab', m === mode);
        });
    }

    function buildSwatch(containerId, cssClass, items, clickFn) {
        var container = document.getElementById(containerId);
        items.forEach(function(item){
            var el = document.createElement('div');
            el.className  = 'flex-shrink-0 cursor-pointer text-center swatch-item ' + cssClass;
            el.dataset.id = item.id;
            el.onclick    = function(){ clickFn(item); };
            el.innerHTML  =
                '<div class="w-14 h-14 rounded-full border border-gray-200 shadow-sm mb-2 swatch-circle mx-auto" style="background:' + item.color + '"></div>' +
                '<p class="text-[9px] font-bold text-gray-700">' + item.name + '</p>' +
                '<p class="text-[8px] text-gray-400">' + item.subtitle + '</p>';
            container.appendChild(el);
        });
    }

    compareBtn.addEventListener('mousedown',  function(){ showMakeup = false; });
    compareBtn.addEventListener('mouseup',    function(){ showMakeup = true; });
    compareBtn.addEventListener('touchstart', function(e){ e.preventDefault(); showMakeup = false; });
    compareBtn.addEventListener('touchend',   function(){ showMakeup = true; });
    document.getElementById('guide-toggle').addEventListener('click', function(){ showGuides = !showGuides; });

    buildSwatch('lip-selector',  'lip-swatch',  lipColors,  setLipColor);
    buildSwatch('eye-selector',  'eye-swatch',  eyeColors,  setEyeColor);
    buildSwatch('base-selector', 'base-swatch', baseColors, setBaseColor);
</script>

    function buildCartScreen() {
        var items = [];
        if (activeLipId)  items.push(Object.assign({}, productCatalog.lip[activeLipId],  { color: activeLipColor }));
        if (activeEyeId)  items.push(Object.assign({}, productCatalog.eye[activeEyeId],  { color: activeEyeColor }));
        if (activeBaseId) items.push(Object.assign({}, productCatalog.base[activeBaseId], { color: activeBaseColor }));

        var cartItemsEl   = document.getElementById('cart-items');
        var cartEmptyEl   = document.getElementById('cart-empty');
        var cartSummaryEl = document.getElementById('cart-summary');
        cartItemsEl.innerHTML = '';

        if (items.length === 0) {
            cartEmptyEl.style.display = 'flex';
            cartSummaryEl.classList.add('hidden');
        } else {
            cartEmptyEl.style.display = 'none';
            cartSummaryEl.classList.remove('hidden');
            var total = 0;
            items.forEach(function(item){
                total += item.price;
                var el = document.createElement('div');
                el.className = 'flex items-center gap-4 p-4 bg-white rounded-2xl border border-gray-100 shadow-sm';
                el.innerHTML =
                    '<div class="w-14 h-14 rounded-xl flex-shrink-0 shadow-sm" style="background:' + (item.color || '#ccc') + '; opacity:0.85;"></div>' +
                    '<div class="flex-grow min-w-0">' +
                        '<p class="text-[10px] font-bold tracking-widest text-gray-300 uppercase">' + item.tag + '</p>' +
                        '<p class="text-sm font-bold text-[#1a1a1a] mt-0.5 truncate">' + item.name + '</p>' +
                        '<p class="text-[10px] text-gray-400 mt-0.5">' + item.subtitle + '</p>' +
                    '</div>' +
                    '<div class="flex-shrink-0 text-right">' +
                        '<p class="text-sm font-bold text-[#1a1a1a]">NT$ ' + item.price.toLocaleString() + '</p>' +
                        '<p class="text-[9px] text-gray-300 mt-1">x 1</p>' +
                    '</div>';
                cartItemsEl.appendChild(el);
            });
            document.getElementById('subtotal-price').textContent = 'NT$ ' + total.toLocaleString();
            document.getElementById('total-price').textContent    = 'NT$ ' + total.toLocaleString();
        }
    }

    function showCartScreen() {
        buildCartScreen();
        document.querySelector('.max-w-md.mx-auto.min-h-screen').style.display = 'none';
        var cs = document.getElementById('cart-screen');
        cs.classList.remove('hidden');
        cs.scrollTop = 0;

    function hideCartScreen() {
        document.getElementById('cart-screen').classList.add('hidden');
        document.querySelector('.max-w-md.mx-auto.min-h-screen').style.display = 'flex';

    document.getElementById('cart-btn').addEventListener('click', showCartScreen);

    document.getElementById('cart-back-btn2').addEventListener('click', hideCartScreen);
</script>
