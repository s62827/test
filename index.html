<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Try-On Plugin - 智能分析穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation;
            background-color: #fff; 
        }

        .vto-container {
            aspect-ratio: 3/4;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }
        
        #video-element, #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mirror { transform: scaleX(-1); }
        .active-tab { color: #1a1a1a; font-weight: 700; border-bottom: 2px solid #1a1a1a; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .swatch-item.active .swatch-circle {
            border: 2px solid #1a1a1a;
            padding: 2px;
            background-clip: content-box;
            transform: scale(1.1);
        }

        .option-btn {
            border: 1px solid #F3E8F0;
            padding: 10px 4px;
            border-radius: 12px;
            font-size: 11px;
            transition: all 0.2s;
            text-align: center;
            background: white;
        }
        .option-btn.active { background-color: #1a1a1a; color: #fff; border-color: #1a1a1a; }

        #start-screen { background-color: #fff; z-index: 100; }
        .btn-primary { background-color: #1a1a1a; transition: transform 0.2s ease; }
        .btn-primary:active { transform: scale(0.95); }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #1a1a1a, transparent);
            box-shadow: 0 0 15px #1a1a1a;
            animation: scan 2s linear infinite;
            display: none;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="text-[#5d5d5d]">

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative" id="main-app">
        
        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-700">
            <h2 class="text-[#1a1a1a] text-xl font-bold mb-20 tracking-wider uppercase">AI Beauty Try-On Plugin</h2>
             <div class="bg-stone-50 p-6 rounded-[2rem] text-left mb-10 border border-stone-100 shadow-sm">
                <p class="text-sm font-bold mb-4 text-stone-800">為了確保「自然服貼」效果，請注意：</p>
                <div class="space-y-3 text-xs text-stone-500">
                    <p>1. 💡 正確燈光：請面向光源，確保光線充足。</p>
                    <p>2. ❗ 避免濃妝：建議素顏或淡妝使用，以確保最佳體驗。</p>
                </div>
            </div>
            <button id="init-btn" class="btn-primary text-white px-10 py-4 rounded-full text-lg font-bold shadow-lg mb-6">
                開啟鏡頭並開始試妝
            </button>
            <p class="text-gray-400 text-sm">* 點擊即表示允許瀏覽器存取攝影機</p>
        </div>

        <header class="p-5 text-center bg-[#fff]">
            <h1 class="text-sm font-bold tracking-[0.2em] uppercase text-[#333]">AI Beauty Try-On Plugin</h1>
            <div class="h-px w-8 bg-[#1a1a1a] mx-auto mt-2 opacity-30"></div>
            <p class="text-[9px] text-[#1a1a1a] mt-2 tracking-[0.2em] uppercase font-bold italic">Smart Analysis System</p>
        </header>

        <main id="app-content" class="flex-grow px-6 opacity-0 transition-opacity duration-1000 overflow-y-auto pb-10">
            <div class="vto-container mt-4 relative border border-gray-100">
                <div id="loading-overlay" class="absolute inset-0 z-50 bg-white/90 flex flex-col items-center justify-center">
                    <div class="w-8 h-8 border-2 border-gray-200 border-t-[#1a1a1a] rounded-full animate-spin"></div>
                    <p class="text-[10px] mt-4 tracking-widest text-[#1a1a1a] font-bold uppercase">AI Scanning...</p>
                </div>

                <div id="scan-bar" class="scan-line z-20"></div>

                <video id="video-element" class="mirror" playsinline muted autoplay></video>
                <canvas id="output-canvas" class="mirror"></canvas>

                <div class="absolute top-4 right-4 z-30">
                    <button id="ai-analyze-btn" class="bg-white/90 backdrop-blur-md p-3 rounded-full shadow-lg border border-gray-200 flex items-center justify-center group active:scale-90 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#1a1a1a]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                        </svg>
                        <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 ease-in-out text-[10px] font-bold ml-2 text-[#1a1a1a]">AI 智慧分析推薦</span>
                    </button>
                </div>

                <div class="absolute bottom-6 left-6 right-6 flex justify-between items-center z-10">
                    <button id="compare-btn" class="w-10 h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-[#333] text-[9px] shadow-sm border border-white active:scale-95 transition">對比</button>
                    <button id="guide-toggle" class="w-10 h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-[#333] text-[9px] shadow-sm border border-white active:scale-95 transition">比例</button>
                </div>
            </div>

            <div id="ai-result-panel" class="hidden mt-6 p-4 bg-gray-50/50 rounded-2xl border border-gray-200">
                <div class="flex items-start mb-2">
                    <div class="p-2 bg-white rounded-lg mr-3 shadow-sm text-[#1a1a1a]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="flex-grow">
                        <h4 class="text-xs font-bold text-gray-800">AI 智能分析報告</h4>
                        <p id="ai-analysis-text" class="text-[10px] text-gray-500 mt-1 leading-relaxed">正在解析...</p>
                    </div>
                </div>
            </div>

            <div class="mt-6">
                <div class="flex space-x-5 mb-5 text-gray-400 text-[10px] tracking-widest overflow-x-auto no-scrollbar border-b border-gray-100">
                    <button onclick="changeUIMode('lip')" id="tab-lip" class="pb-2 active-tab whitespace-nowrap uppercase">唇妝</button>
                    <button onclick="changeUIMode('eye-color')" id="tab-eye-color" class="pb-2 whitespace-nowrap uppercase">眼妝</button>
                    <button onclick="changeUIMode('blush')" id="tab-blush" class="pb-2 whitespace-nowrap uppercase">腮紅</button>
                    <button onclick="changeUIMode('base')" id="tab-base" class="pb-2 whitespace-nowrap uppercase">底妝質感</button>
                    <button onclick="changeUIMode('eye')" id="tab-eye" class="pb-2 whitespace-nowrap uppercase">眼影效果</button>
                    <button onclick="changeUIMode('shape')" id="tab-shape" class="pb-2 whitespace-nowrap uppercase">唇形修飾</button>
                </div>

                <div class="min-h-[140px]">
                    <div id="lip-panel" class="block">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="lip-selector"></div>
                    </div>
                    <div id="eye-color-panel" class="hidden">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="eye-selector"></div>
                    </div>
                    <div id="blush-panel" class="hidden">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="blush-selector"></div>
                    </div>
                    <div id="base-panel" class="hidden">
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setBaseStyle('natural')" id="base-natural" class="option-btn active uppercase">輕透原生</button>
                            <button onclick="setBaseStyle('matte')" id="base-matte" class="option-btn uppercase">絲絨柔霧</button>
                            <button onclick="setBaseStyle('glow')" id="base-glow" class="option-btn uppercase">貴婦水光</button>
                        </div>
                    </div>
                    <div id="eye-panel" class="hidden">
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setEyeStyle('daily')" id="eye-daily" class="option-btn active uppercase">日常深邃</button>
                            <button onclick="setEyeStyle('rose')" id="eye-rose" class="option-btn uppercase">燕麥玫瑰</button>
                            <button onclick="setEyeStyle('tea')" id="eye-tea" class="option-btn uppercase">炭焙拿鐵</button>
                        </div>
                    </div>
                    <div id="shape-panel" class="hidden">
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setLipShape('natural')" id="shape-natural" class="option-btn active uppercase">原生唇形</button>
                            <button onclick="setLipShape('plump')" id="shape-plump" class="option-btn uppercase">豐盈飽滿</button>
                            <button onclick="setLipShape('slim')" id="shape-slim" class="option-btn uppercase">清秀精緻</button>
                            <button onclick="setLipShape('m-shape')" id="shape-m-shape" class="option-btn uppercase">Ｍ字微笑</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-6 pt-2 bg-white border-t border-gray-50">
            <button id="cart-btn" class="w-full bg-[#1a1a1a] text-white py-4 rounded-xl font-bold text-[11px] tracking-[0.3em] uppercase shadow-lg">
                加入購物清單
            </button>
        </footer>
    </div>

    <div id="cart-screen" class="hidden max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl">
        <header class="p-5 bg-white border-b border-gray-100 flex items-center">
            <button id="cart-back-btn" class="flex items-center gap-1 text-xs font-bold tracking-wider text-[#1a1a1a]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                返回
            </button>
            <div class="flex-grow text-center">
                <h1 class="text-sm font-bold tracking-[0.2em] uppercase text-[#333]">購物清單</h1>
            </div>
            <div class="w-12"></div>
        </header>
        <main class="flex-grow overflow-y-auto px-6 py-6">
            <div id="cart-empty" class="flex flex-col items-center justify-center h-60 text-center">
                <p class="text-xs text-gray-400">尚未選擇任何產品</p>
            </div>
            <div id="cart-items" class="space-y-3"></div>
            <div id="cart-summary" class="hidden mt-6 p-4 bg-gray-50 rounded-2xl">
                <div class="flex justify-between text-sm font-bold text-[#1a1a1a]">
                    <span>總計</span><span id="total-price">NT$ 0</span>
                </div>
            </div>
        </main>
        <footer class="p-6 bg-white border-t space-y-2">
            <button class="w-full bg-[#1a1a1a] text-white py-4 rounded-xl font-bold text-[11px] uppercase">立即結帳</button>
        </footer>
    </div>

    <script>
        const videoElement = document.getElementById('video-element');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const startScreen = document.getElementById('start-screen');
        const appContent = document.getElementById('app-content');
        const initBtn = document.getElementById('init-btn');
        const compareBtn = document.getElementById('compare-btn');
        const analyzeBtn = document.getElementById('ai-analyze-btn');
        const scanBar = document.getElementById('scan-bar');
        const aiPanel = document.getElementById('ai-result-panel');
        const aiText = document.getElementById('ai-analysis-text');

        const apiKey = "AIzaSyCldI4W0JQMZs9cKW8qmVz-hEUVOZJGopA"; 

        let currentLipShape = 'natural', currentBaseStyle = 'natural', currentEyeStyle = 'daily';
        let showMakeup = true, showGuides = false;
        
        const looks = [
            { id: 'ginger', name: '01 柔薑', lip: '#A95842', eye: '#8B6A5A', blush: '#D5A893' },
            { id: 'rose', name: '02 燕麥玫瑰', lip: '#B25F60', eye: '#967A7A', blush: '#C89B9B' },
            { id: 'nut', name: '03 烤栗子', lip: '#8B4232', eye: '#7A5E4E', blush: '#B88F7F' },
            { id: 'tea', name: '04 肉桂奶茶', lip: '#B26D57', eye: '#917869', blush: '#D2AF9D' },
            { id: 'berry', name: '05 煙燻莓果', lip: '#8E4B56', eye: '#7A646E', blush: '#B78F98' },
            { id: 'honey', name: '06 蜜糖橘', lip: '#C26949', eye: '#A68364', blush: '#E5B198' },
            { id: 'cocoa', name: '07 慕斯可可', lip: '#6D3D32', eye: '#665248', blush: '#A38475' }
        ];

        let activeLipColor = null, activeEyeColor = null, activeBlushColor = null;
        let activeLipId = null, activeEyeId = null, activeBlushId = null;

        const UPPER_LIP = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78];
        const LOWER_LIP = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];
        const FACE_OVAL = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];

        function tryExtractJson(text) {
            try { return JSON.parse(text); } catch (e) {
                const match = text.match(/\{[\s\S]*\}/);
                return match ? JSON.parse(match[0]) : null;
            }
        }

        async function performAIAnalysis() {
            try {
                analyzeBtn.disabled = true;
                scanBar.style.display = 'block';
                aiPanel.classList.remove('hidden');
                aiText.innerText = "智慧分析推薦中...";

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 400; tempCanvas.height = videoElement.videoHeight * (400 / videoElement.videoWidth);
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
                const base64Image = tempCanvas.toDataURL('image/jpeg', 0.2).split(',')[1];

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [ 
                            { text: "Analyze skin tone and pick ONE id from: " + JSON.stringify(looks.map(l=>l.id)) + ". Return JSON {skin_tone, face_shape, recommended_id, advice}." }, 
                            { inlineData: { mimeType: "image/jpeg", data: base64Image } } 
                        ] }],
                        generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                    })
                });

                const result = await response.json();
                const finalData = tryExtractJson(result.candidates[0].content.parts[0].text);
                const look = looks.find(l => l.id === finalData.recommended_id) || looks[0];
                
                // AI 推薦後自動更新所有部位
                activeLipColor = look.lip; activeLipId = look.id;
                activeEyeColor = look.eye; activeEyeId = look.id;
                activeBlushColor = look.blush; activeBlushId = look.id;
                
                refreshSwatches();
                aiText.innerHTML = `<strong>${finalData.skin_tone}</strong> | 建議：${finalData.advice}<br>為您推薦：${look.name}`;

            } catch (error) {
                aiText.innerText = "分析失敗，請重試。";
            } finally {
                scanBar.style.display = 'none'; analyzeBtn.disabled = false;
            }
        }

        analyzeBtn.addEventListener('click', performAIAnalysis);

        function setLipColor(id) {
            const look = looks.find(l => l.id === id);
            if (activeLipId === id) { activeLipColor = null; activeLipId = null; }
            else { activeLipColor = look.lip; activeLipId = id; }
            refreshSwatches();
        }
        function setEyeColor(id) {
            const look = looks.find(l => l.id === id);
            if (activeEyeId === id) { activeEyeColor = null; activeEyeId = null; }
            else { activeEyeColor = look.eye; activeEyeId = id; }
            refreshSwatches();
        }
        function setBlushColor(id) {
            const look = looks.find(l => l.id === id);
            if (activeBlushId === id) { activeBlushColor = null; activeBlushId = null; }
            else { activeBlushColor = look.blush; activeBlushId = id; }
            refreshSwatches();
        }

        function refreshSwatches() {
            document.querySelectorAll('.swatch-item').forEach(el => {
                const id = el.dataset.id;
                if (el.classList.contains('lip-swatch')) el.classList.toggle('active', id === activeLipId);
                if (el.classList.contains('eye-swatch')) el.classList.toggle('active', id === activeEyeId);
                if (el.classList.contains('blush-swatch')) el.classList.toggle('active', id === activeBlushId);
            });
        }

        function onResults(results) {
            if (loadingOverlay.style.display !== 'none') {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
            }
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (showMakeup && results.multiFaceLandmarks?.[0]) {
                const landmarks = results.multiFaceLandmarks[0];
                drawBaseMakeup(landmarks, currentBaseStyle);
                if (activeEyeColor) {
                    const color = currentEyeStyle === 'rose' ? '#A68A8A' : (currentEyeStyle === 'tea' ? '#8C7665' : activeEyeColor);
                    drawNaturalLayer(landmarks, [226, 247, 30, 29, 27, 28, 56, 190, 243], color, 0.4, 10, 'multiply');
                    drawNaturalLayer(landmarks, [463, 414, 286, 258, 257, 259, 260, 467, 446], color, 0.4, 10, 'multiply');
                }
                if (activeBlushColor) drawHemeBlush(landmarks, activeBlushColor);
                if (activeLipColor) drawReshapedLips(landmarks, activeLipColor);
                if (showGuides) drawProportionGuides(landmarks);
            }
            canvasCtx.restore();
        }

        function drawBaseMakeup(landmarks, style) {
            if (style === 'natural') return;
            const ovalPoints = FACE_OVAL.map(idx => landmarks[idx]);
            canvasCtx.save();
            if (style === 'matte') {
                canvasCtx.globalCompositeOperation = 'multiply'; canvasCtx.globalAlpha = 0.08; canvasCtx.fillStyle = '#F5E3D5';
                canvasCtx.beginPath(); canvasCtx.moveTo(ovalPoints[0].x * canvasElement.width, ovalPoints[0].y * canvasElement.height);
                ovalPoints.forEach(p => canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height)); canvasCtx.fill();
            } else if (style === 'glow') {
                canvasCtx.globalCompositeOperation = 'screen'; canvasCtx.globalAlpha = 0.15;
                [1, 4, 168].forEach(idx => {
                    const pt = landmarks[idx];
                    canvasCtx.beginPath(); canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 40, 0, Math.PI * 2); canvasCtx.fillStyle = 'white'; canvasCtx.fill();
                });
            }
            canvasCtx.restore();
        }

        function drawReshapedLips(landmarks, color) {
            const getPoints = (indices) => indices.map(idx => {
                let p = { ...landmarks[idx] };
                if (currentLipShape === 'plump') { p.y += (p.y - landmarks[13].y) * 0.1; }
                return p;
            });
            drawPath(getPoints(UPPER_LIP), color, 0.4, 8, 'multiply');
            drawPath(getPoints(LOWER_LIP), color, 0.4, 8, 'multiply');
        }

        function drawPath(points, color, alpha, blur, composite) {
            canvasCtx.save(); canvasCtx.globalCompositeOperation = composite; canvasCtx.globalAlpha = alpha;
            canvasCtx.filter = `blur(${blur}px)`; canvasCtx.fillStyle = color;
            canvasCtx.beginPath(); canvasCtx.moveTo(points[0].x * canvasElement.width, points[0].y * canvasElement.height);
            points.forEach(p => canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height));
            canvasCtx.fill(); canvasCtx.restore();
        }

        function drawNaturalLayer(landmarks, indices, color, alpha, blur, composite) {
            const points = indices.map(i => landmarks[i]); drawPath(points, color, alpha, blur, composite);
        }

        function drawHemeBlush(landmarks, color) {
            [landmarks[205], landmarks[425]].forEach(pt => {
                canvasCtx.save(); canvasCtx.globalCompositeOperation = 'multiply'; canvasCtx.globalAlpha = 0.4;
                canvasCtx.filter = 'blur(20px)';
                canvasCtx.beginPath(); canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 45, 0, Math.PI * 2);
                canvasCtx.fillStyle = color; canvasCtx.fill(); canvasCtx.restore();
            });
        }

        function drawProportionGuides(landmarks) {
            canvasCtx.strokeStyle = 'rgba(0,0,0,0.3)'; canvasCtx.setLineDash([5, 5]);
            [10, 168, 2, 152].forEach(idx => {
                canvasCtx.beginPath(); canvasCtx.moveTo(0, landmarks[idx].y * canvasElement.height);
                canvasCtx.lineTo(canvasElement.width, landmarks[idx].y * canvasElement.height); canvasCtx.stroke();
            });
        }

        function changeUIMode(mode) {
            ['lip', 'eye-color', 'blush', 'base', 'eye', 'shape'].forEach(m => {
                const el = document.getElementById(`${m}-panel`);
                if (el) el.style.display = m === mode ? 'block' : 'none';
                const tab = document.getElementById(`tab-${m}`);
                if (tab) tab.classList.toggle('active-tab', m === mode);
            });
        }

        function setBaseStyle(s) { currentBaseStyle = s; updateActiveBtn('base', s); }
        function setEyeStyle(s) { currentEyeStyle = s; updateActiveBtn('eye', s); }
        function setLipShape(s) { currentLipShape = s; updateActiveBtn('shape', s); }
        function updateActiveBtn(prefix, s) {
            document.querySelectorAll(`#${prefix}-panel .option-btn`).forEach(b => b.classList.toggle('active', b.id === `${prefix}-${s}`));
        }

        initBtn.addEventListener('click', () => {
            startScreen.style.opacity = '0'; appContent.style.opacity = '1';
            setTimeout(() => { 
                startScreen.style.display = 'none'; 
                const faceMesh = new FaceMesh({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}` });
                faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.5 });
                faceMesh.onResults(onResults);
                new Camera(videoElement, { onFrame: async () => await faceMesh.send({ image: videoElement }), width: 640, height: 480 }).start();
            }, 700);
        });

        // 購物車邏輯實作
        document.getElementById('cart-btn').addEventListener('click', () => {
            const items = [];
            if (activeLipId) items.push({ type: '唇妝', name: looks.find(l=>l.id===activeLipId).name });
            if (activeEyeId) items.push({ type: '眼妝', name: looks.find(l=>l.id===activeEyeId).name });
            if (activeBlushId) items.push({ type: '腮紅', name: looks.find(l=>l.id===activeBlushId).name });

            const container = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');
            const empty = document.getElementById('cart-empty');

            if (items.length > 0) {
                container.innerHTML = items.map(i => `<div class="p-4 bg-gray-50 rounded-xl flex justify-between"><span class="text-xs font-bold">${i.type}</span><span class="text-xs">${i.name}</span></div>`).join('');
                document.getElementById('total-price').innerText = `NT$ ${items.length * 450}`;
                summary.classList.remove('hidden'); empty.classList.add('hidden');
            }
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('cart-screen').classList.remove('hidden');
        });

        document.getElementById('cart-back-btn').addEventListener('click', () => {
            document.getElementById('cart-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        });

        // 初始化色票
        const swatchTypes = ['lip', 'eye', 'blush'];
        swatchTypes.forEach(type => {
            const container = document.getElementById(`${type}-selector`);
            container.innerHTML = looks.map(l => `
                <div class="swatch-item flex-shrink-0 text-center ${type}-swatch" data-id="${l.id}" onclick="set${type.charAt(0).toUpperCase()+type.slice(1)}Color('${l.id}')">
                    <div class="swatch-circle w-12 h-12 rounded-full mx-auto mb-1 border-2 border-transparent" style="background-color: ${l[type === 'eye' ? 'eye' : (type === 'lip' ? 'lip' : 'blush')]}"></div>
                    <p class="text-[8px] whitespace-nowrap">${l.name}</p>
                </div>
            `).join('');
        });

        compareBtn.addEventListener('mousedown', () => showMakeup = false);
        compareBtn.addEventListener('mouseup', () => showMakeup = true);
        compareBtn.addEventListener('touchstart', () => showMakeup = false);
        compareBtn.addEventListener('touchend', () => showMakeup = true);
        document.getElementById('guide-toggle').addEventListener('click', () => showGuides = !showGuides);
    </script>
</body>
</html>
