    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation;
            background-color: #fff; 
        }

        .vto-container {
            aspect-ratio: 3/4;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
        }
        
        #video-element, #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mirror { transform: scaleX(-1); }
        .active-tab { color: #1a1a1a; font-weight: 700; border-bottom: 2px solid #1a1a1a; }
        .swatch-scroll-wrap {
            position: relative;
        }
        .swatch-scroll-wrap::after {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 32px;
            background: linear-gradient(to right, transparent, white);
            pointer-events: none;
        }
        .no-scrollbar { -webkit-overflow-scrolling: touch; }
        
        .swatch-item.active .swatch-circle {
            border: 2px solid #1a1a1a;
            padding: 2px;
            background-clip: content-box;
            transform: scale(1.1);
        }

        .option-btn {
            border: 1px solid #F3E8F0;
            padding: 10px 4px;
            border-radius: 12px;
            font-size: 11px;
            transition: all 0.2s;
            text-align: center;
            background: white;
        }
        .option-btn.active { background-color: #1a1a1a; color: #fff; border-color: #1a1a1a; }

        #start-screen { background-color: #fff; z-index: 100; }
        .btn-primary { background-color: #1a1a1a; transition: transform 0.2s ease; }
        .btn-primary:active { transform: scale(0.95); }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #1a1a1a, transparent);
            box-shadow: 0 0 15px #1a1a1a;
            animation: scan 2s linear infinite;
            display: none;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>

    <script>
        const videoElement = document.getElementById('video-element');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const startScreen = document.getElementById('start-screen');
        const appContent = document.getElementById('app-content');
        const initBtn = document.getElementById('init-btn');
        const compareBtn = document.getElementById('compare-btn');
        const analyzeBtn = document.getElementById('ai-analyze-btn');
        const scanBar = document.getElementById('scan-bar');
        const aiPanel = document.getElementById('ai-result-panel');
        const aiText = document.getElementById('ai-analysis-text');

        const apiKey = "AIzaSyCldI4W0JQMZs9cKW8qmVz-hEUVOZJGopA"; 

        let currentLipShape = 'natural', currentBaseStyle = 'natural', currentEyeStyle = 'daily';
        let showMakeup = true, showGuides = false;
        
        const looks = [
            { id: 'ginger', name: '01 柔薑', lip: '#A95842', eye: '#8B6A5A', blush: '#D5A893' },
            { id: 'rose', name: '02 燕麥玫瑰', lip: '#B25F60', eye: '#967A7A', blush: '#C89B9B' },
            { id: 'nut', name: '03 烤栗子', lip: '#8B4232', eye: '#7A5E4E', blush: '#B88F7F' },
            { id: 'tea', name: '04 肉桂奶茶', lip: '#B26D57', eye: '#917869', blush: '#D2AF9D' },
            { id: 'berry', name: '05 煙燻莓果', lip: '#8E4B56', eye: '#7A646E', blush: '#B78F98' },
            { id: 'honey', name: '06 蜜糖橘', lip: '#C26949', eye: '#A68364', blush: '#E5B198' },
            { id: 'cocoa', name: '07 慕斯可可', lip: '#6D3D32', eye: '#665248', blush: '#A38475' }
        ];
        let activeLook = looks[0];

        // 三個部位各自獨立的顏色狀態（預設未選）
        let activeLipColor = null;
        let activeEyeColor = null;
        let activeBlushColor = null;
        let activeLipId = null;
        let activeEyeId = null;
        let activeBlushId = null;

        const UPPER_LIP = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78];
        const LOWER_LIP = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];
        const FACE_OVAL = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];

        function tryExtractJson(text) {
            try { return JSON.parse(text); } catch (e) {
                const match = text.match(/\{[\s\S]*\}/);
                if (match) {
                    try { return JSON.parse(match[0]); } catch (e2) { return null; }
                }
                return null;
            }
        }

        async function performAIAnalysis() {
            try {
                analyzeBtn.disabled = true;
                scanBar.style.display = 'block';
                aiPanel.classList.remove('hidden');
                aiText.innerText = "智慧分析推薦中，請稍候...";

                // 擷取畫面並壓縮
                const targetWidth = 400;
                const scale = targetWidth / videoElement.videoWidth;
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = targetWidth;
                tempCanvas.height = videoElement.videoHeight * scale;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
                const base64Image = tempCanvas.toDataURL('image/jpeg', 0.2).split(',')[1];

                const systemPrompt = `You are a professional makeup AI. Analyze the skin tone and face shape of the user.
                Pick ONE ideal color from this list: ${JSON.stringify(looks.map(l => ({id: l.id, name: l.name})))} stably.
                Return ONLY a JSON object with these keys: skin_tone, face_shape, recommended_id, advice.`;

                const userQuery = "Please analyze my face features and recommend a makeup look.";

                let retries = 0;
                let finalData = null;
                
               while (retries < 3 && !finalData) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            contents: [{ parts: [ { text: userQuery }, { inlineData: { mimeType: "image/jpeg", data: base64Image } } ] }],
                            generationConfig: { 
                                responseMimeType: "application/json",
                                temperature: 0.1,
                                maxOutputTokens: 300
                            }
                        })
                    });
            
                    // --- 重點修正：手動檢查回應狀態 ---
                    if (!response.ok) {
                        const errorData = await response.json();
                        console.error(`API 錯誤 (${response.status}):`, errorData);
                        
                        // 遇到 429 (太頻繁) 或 503 (伺服器載重) 就進入重試邏輯
                        if (response.status === 429 || response.status === 503) {
                            retries++;
                            console.warn(`正在進行第 ${retries} 次重試...`);
                            await new Promise(r => setTimeout(r, 2000 * retries)); // 稍微拉長等待時間
                            continue; // 跳回 while 開頭重新發送
                        }
                        break; // 其他無法修復的錯誤 (如 400 參數錯誤) 就直接停止，避免浪費額度
                    }
            
                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (text) {
                        finalData = tryExtractJson(text);
                        if (finalData) break;
                    } else {
                        // 有回應但沒有內容，也算失敗
                        retries++;
                    }
            
                } catch (e) {
                    console.error("網路連線或語法異常:", e);
                    retries++;
                    await new Promise(r => setTimeout(r, 1000 * retries));
                }
            }

                if (!finalData) throw new Error("API 解析異常");

                const recommendedLook = looks.find(l => l.id === finalData.recommended_id) || looks[0];
                selectLook(recommendedLook);
                
                aiText.innerHTML = `<strong>${finalData.skin_tone}</strong> | 臉型：${finalData.face_shape}<br>建議：${finalData.advice}<br><span class="text-[#1a1a1a] font-bold">為您推薦：${recommendedLook.name}</span>`;

            } catch (error) {
                console.error("Analysis Failed:", error);
                aiText.innerText = "分析失敗，請正對攝像頭並確保光線充足再試一次。";
            } finally {
                scanBar.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }

        analyzeBtn.addEventListener('click', performAIAnalysis);

        function selectLook(look) {
            activeLook = look;
            // 同時更新三個部位顏色（AI 推薦時使用）
            activeLipColor = look.lip; activeLipId = look.id;
            activeEyeColor = look.eye; activeEyeId = look.id;
            activeBlushColor = look.blush; activeBlushId = look.id;
            refreshSwatches();
        }

        function setLipColor(look) {
            if (activeLipId === look.id) {
                activeLipColor = null; activeLipId = null;
            } else {
                activeLipColor = look.lip; activeLipId = look.id;
            }
            refreshSwatches();
        }
        function setEyeColor(look) {
            if (activeEyeId === look.id) {
                activeEyeColor = null; activeEyeId = null;
            } else {
                activeEyeColor = look.eye; activeEyeId = look.id;
            }
            refreshSwatches();
        }
        function setBlushColor(look) {
            if (activeBlushId === look.id) {
                activeBlushColor = null; activeBlushId = null;
            } else {
                activeBlushColor = look.blush; activeBlushId = look.id;
            }
            refreshSwatches();
        }

        function refreshSwatches() {
            document.querySelectorAll('.lip-swatch').forEach(el => el.classList.toggle('active', el.dataset.id === activeLipId));
            document.querySelectorAll('.eye-swatch').forEach(el => el.classList.toggle('active', el.dataset.id === activeEyeId));
            document.querySelectorAll('.blush-swatch').forEach(el => el.classList.toggle('active', el.dataset.id === activeBlushId));
        }

        // --- MediaPipe 渲染邏輯 ---
        function onResults(results) {
            if (loadingOverlay.style.opacity !== '0') {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
            }
            if (videoElement.videoWidth > 0) {
                if (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight) {
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                }
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (showMakeup && results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                drawBaseMakeup(landmarks, currentBaseStyle);
                if (activeEyeColor !== null) {
                    const eyeColor = currentEyeStyle === 'rose' ? '#A68A8A' : (currentEyeStyle === 'tea' ? '#8C7665' : activeEyeColor);
                    drawNaturalLayer(landmarks, [226, 247, 30, 29, 27, 28, 56, 190, 243], eyeColor, 0.45, 12, 'multiply');
                    drawNaturalLayer(landmarks, [463, 414, 286, 258, 257, 259, 260, 467, 446], eyeColor, 0.45, 12, 'multiply');
                }
                if (activeBlushColor !== null) drawHemeBlush(landmarks, activeBlushColor);
                if (activeLipColor !== null) drawReshapedLips(landmarks, activeLipColor);
                if (showGuides) drawProportionGuides(landmarks);
            }
            canvasCtx.restore();
        }

        function drawBaseMakeup(landmarks, style) {
            if (style === 'natural') return;
            canvasCtx.save();
            const ovalPoints = FACE_OVAL.map(idx => landmarks[idx]);
            if (style === 'matte') {
                canvasCtx.globalCompositeOperation = 'multiply'; canvasCtx.globalAlpha = 0.08; canvasCtx.fillStyle = '#F5E3D5';
                canvasCtx.beginPath(); canvasCtx.moveTo(ovalPoints[0].x * canvasElement.width, ovalPoints[0].y * canvasElement.height);
                ovalPoints.forEach(p => canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height)); canvasCtx.fill();
            } else if (style === 'glow') {
                [1, 4, 168].forEach(idx => {
                    const pt = landmarks[idx];
                    const grad = canvasCtx.createRadialGradient(pt.x * canvasElement.width, pt.y * canvasElement.height, 0, pt.x * canvasElement.width, pt.y * canvasElement.height, 40);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 0.15)'); grad.addColorStop(1, 'transparent');
                    canvasCtx.fillStyle = grad; canvasCtx.globalCompositeOperation = 'screen';
                    canvasCtx.beginPath(); canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 40, 0, Math.PI * 2); canvasCtx.fill();
                });
            }
            canvasCtx.restore();
        }

        function drawReshapedLips(landmarks, color) {
            const getPoints = (indices) => indices.map(idx => {
                let p = { ...landmarks[idx] };
                const centerX = landmarks[13].x, centerY = (landmarks[13].y + landmarks[14].y) / 2;
                if (currentLipShape === 'plump') { p.x += (p.x - centerX) * 0.12; p.y += (p.y - centerY) * 0.12; }
                else if (currentLipShape === 'slim') { p.x -= (p.x - centerX) * 0.08; p.y -= (p.y - centerY) * 0.08; }
                else if (currentLipShape === 'm-shape') { if ([37, 0, 267].includes(idx)) p.y -= 0.005; if ([61, 291].includes(idx)) p.y -= 0.003; }
                return p;
            });
            const upper = getPoints(UPPER_LIP), lower = getPoints(LOWER_LIP);
            drawPath(upper, color, 0.4, 8, 'multiply');
            drawPath(lower, color, 0.4, 8, 'multiply');
        }

        function drawPath(points, color, alpha, blur, composite) {
            canvasCtx.save(); canvasCtx.globalCompositeOperation = composite; canvasCtx.globalAlpha = alpha;
            canvasCtx.filter = `blur(${blur}px)`; canvasCtx.fillStyle = color;
            canvasCtx.beginPath(); canvasCtx.moveTo(points[0].x * canvasElement.width, points[0].y * canvasElement.height);
            points.forEach(p => canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height));
            canvasCtx.closePath(); canvasCtx.fill(); canvasCtx.restore();
        }

        function drawNaturalLayer(landmarks, indices, color, alpha, blur, composite) {
            const points = indices.map(i => landmarks[i]); drawPath(points, color, alpha, blur, composite);
        }

        function drawHemeBlush(landmarks, color) {
            [landmarks[205], landmarks[425]].forEach(pt => {
                canvasCtx.save(); canvasCtx.globalCompositeOperation = 'multiply'; canvasCtx.globalAlpha = 0.45; 
                canvasCtx.filter = 'blur(25px)';
                const grad = canvasCtx.createRadialGradient(pt.x * canvasElement.width, pt.y * canvasElement.height, 0, pt.x * canvasElement.width, pt.y * canvasElement.height, 50);
                grad.addColorStop(0, color); grad.addColorStop(1, 'transparent');
                canvasCtx.fillStyle = grad;
                canvasCtx.beginPath(); canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 50, 0, Math.PI * 2); canvasCtx.fill();
                canvasCtx.restore();
            });
        }

        function drawProportionGuides(landmarks) {
            canvasCtx.strokeStyle = '#1a1a1a'; canvasCtx.lineWidth = 0.8; canvasCtx.setLineDash([5, 5]);
            const lines = [landmarks[10].y, landmarks[168].y, landmarks[2].y, landmarks[152].y];
            lines.forEach(y => { canvasCtx.beginPath(); canvasCtx.moveTo(canvasElement.width * 0.2, y * canvasElement.height); canvasCtx.lineTo(canvasElement.width * 0.8, y * canvasElement.height); canvasCtx.stroke(); });
        }

        initBtn.addEventListener('click', () => {
            startScreen.style.opacity = '0';
            appContent.style.opacity = '1';
            setTimeout(() => { startScreen.style.display = 'none'; startCamera(); }, 700);
        });

        function startCamera() {
            const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
            faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            faceMesh.onResults(onResults);
            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({ image: videoElement }); },
                width: 640, height: 480, facingMode: 'user'
            });
            camera.start();
        }

        function changeUIMode(mode) {
            ['lip', 'eye-color', 'blush', 'base', 'eye', 'shape'].forEach(m => {
                const el = document.getElementById(`${m}-panel`);
                if (el) el.style.display = m === mode ? 'block' : 'none';
                const tab = document.getElementById(`tab-${m}`);
                if (tab) tab.classList.toggle('active-tab', m === mode);
            });
        }

        function setBaseStyle(style) {
            if (currentBaseStyle === style) {
                currentBaseStyle = null;
                document.querySelectorAll('#base-panel .option-btn').forEach(btn => btn.classList.remove('active'));
                return;
            }
            currentBaseStyle = style;
            document.querySelectorAll('#base-panel .option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`base-${style}`).classList.add('active');
        }
        
        function setEyeStyle(style) {
            if (currentEyeStyle === style) {
                currentEyeStyle = null;
                document.querySelectorAll('#eye-panel .option-btn').forEach(btn => btn.classList.remove('active'));
                return;
            }
            currentEyeStyle = style;
            document.querySelectorAll('#eye-panel .option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`eye-${style}`).classList.add('active');
        }

        function setLipShape(shape) {
            if (currentLipShape === shape) {
                currentLipShape = null;
                document.querySelectorAll('#shape-panel .option-btn').forEach(btn => btn.classList.remove('active'));
                return;
            }
            currentLipShape = shape;
            document.querySelectorAll('#shape-panel .option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`shape-${shape}`).classList.add('active');
        }

        function initUI() {
            function buildSwatch(containerId, cssClass, colorFn, activeFn, activeId) {
                const container = document.getElementById(containerId);
                looks.forEach(look => {
                    const item = document.createElement('div');
                    item.className = `flex-shrink-0 cursor-pointer text-center swatch-item ${cssClass} ${look.id === activeId ? 'active' : ''}`;
                    item.dataset.id = look.id;
                    item.onclick = () => activeFn(look);
                    item.innerHTML = `<div class="w-14 h-14 rounded-full border border-gray-200 shadow-sm mb-2 swatch-circle mx-auto" style="background:${colorFn(look)}"></div><p class="text-[9px] font-bold text-gray-700">${look.name}</p>`;
                    container.appendChild(item);
                });
            }
            buildSwatch('lip-selector', 'lip-swatch', l => l.lip, setLipColor, activeLipId);
            buildSwatch('eye-selector', 'eye-swatch', l => l.eye, setEyeColor, activeEyeId);
            buildSwatch('blush-selector', 'blush-swatch', l => `radial-gradient(circle, ${l.blush} 0%, ${l.blush}88 100%)`, setBlushColor, activeBlushId);
        }

        compareBtn.addEventListener('mousedown', () => showMakeup = false);
        compareBtn.addEventListener('mouseup', () => showMakeup = true);
        compareBtn.addEventListener('touchstart', (e) => { e.preventDefault(); showMakeup = false; });
        compareBtn.addEventListener('touchend', () => showMakeup = true);
        document.getElementById('guide-toggle').addEventListener('click', () => { showGuides = !showGuides; });
        
        initUI();
    </script>
</body>
</html>

};

function buildCartScreen() {
    const items = [];
    if (activeLipId)       items.push({ ...productCatalog.lip[activeLipId],        color: activeLipColor });
    if (activeEyeId)       items.push({ ...productCatalog.eye[activeEyeId],         color: activeEyeColor });
    if (activeBlushId)     items.push({ ...productCatalog.blush[activeBlushId],     color: activeBlushColor });
    if (currentBaseStyle)  items.push({ ...productCatalog.base[currentBaseStyle],   color: '#F5E3D5' });
    if (currentEyeStyle)   items.push({ ...productCatalog.eyeStyle[currentEyeStyle], color: activeEyeColor || '#8B6A5A' });
    if (currentLipShape)   items.push({ ...productCatalog.lipShape[currentLipShape], color: activeLipColor || '#A95842' });

    const cartItemsEl = document.getElementById('cart-items');
    const cartEmptyEl = document.getElementById('cart-empty');
    const cartSummaryEl = document.getElementById('cart-summary');
    cartItemsEl.innerHTML = '';

    if (items.length === 0) {
        cartEmptyEl.style.display = 'flex';
        cartSummaryEl.classList.add('hidden');
    } else {
        cartEmptyEl.style.display = 'none';
        cartSummaryEl.classList.remove('hidden');
        let total = 0;
        items.forEach(item => {
            total += item.price;
            const el = document.createElement('div');
            el.className = 'flex items-center gap-4 p-4 bg-white rounded-2xl border border-gray-100 shadow-sm';
            el.innerHTML = `
                <div class="w-14 h-14 rounded-xl flex-shrink-0 shadow-sm" style="background:${item.color || '#ccc'}; opacity:0.85;"></div>
                <div class="flex-grow min-w-0">
                    <p class="text-[10px] font-bold tracking-widest text-gray-300 uppercase">${item.tag}</p>
                    <p class="text-sm font-bold text-[#1a1a1a] mt-0.5 truncate">${item.name}</p>
                    <p class="text-[10px] text-gray-400 mt-0.5">${item.subtitle}</p>
                </div>
                <div class="flex-shrink-0 text-right">
                    <p class="text-sm font-bold text-[#1a1a1a]">NT$ ${item.price.toLocaleString()}</p>
                    <p class="text-[9px] text-gray-300 mt-1">× 1</p>
                </div>
            `;
            cartItemsEl.appendChild(el);
        });
        document.getElementById('subtotal-price').textContent = 'NT$ ' + total.toLocaleString();
        document.getElementById('total-price').textContent = 'NT$ ' + total.toLocaleString();
    }
}

function showCartScreen() {
    buildCartScreen();
    document.querySelector('.max-w-md.mx-auto.min-h-screen').style.display = 'none';
    const cs = document.getElementById('cart-screen');
    cs.classList.remove('hidden');
    cs.scrollTop = 0;
}

function hideCartScreen() {
    document.getElementById('cart-screen').classList.add('hidden');
    document.querySelector('.max-w-md.mx-auto.min-h-screen').style.display = 'flex';
}

document.getElementById('cart-btn').addEventListener('click', showCartScreen);
document.getElementById('cart-back-btn').addEventListener('click', hideCartScreen);
document.getElementById('cart-back-btn2').addEventListener('click', hideCartScreen);
</script>
