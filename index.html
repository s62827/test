<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Beauty Try-On Plugin - 智能分析穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            touch-action: manipulation;
            background-color: #FAF5F9; 
        }

        .vto-container {
            aspect-ratio: 3/4;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 10px 30px -5px rgba(233, 80, 160, 0.1);
        }
        
        #video-element, #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mirror { transform: scaleX(-1); }
        .active-tab { color: #E950A0; font-weight: 700; border-bottom: 2px solid #E950A0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .swatch-item.active .swatch-circle {
            border: 2px solid #E950A0;
            padding: 2px;
            background-clip: content-box;
            transform: scale(1.1);
        }

        .option-btn {
            border: 1px solid #F3E8F0;
            padding: 10px 4px;
            border-radius: 12px;
            font-size: 11px;
            transition: all 0.2s;
            text-align: center;
            background: white;
        }
        .option-btn.active { background-color: #E950A0; color: #fff; border-color: #E950A0; }

        #start-screen { background-color: #FAF5F9; z-index: 100; }
        .btn-primary { background-color: #E950A0; transition: transform 0.2s ease; }
        .btn-primary:active { transform: scale(0.95); }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #E950A0, transparent);
            box-shadow: 0 0 15px #E950A0;
            animation: scan 2s linear infinite;
            display: none;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="text-[#5d5d5d]">

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">
        
        <!-- 歡迎頁面 -->
        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-700">
            <h2 class="text-[#E950A0] text-xl font-bold mb-32 tracking-wider uppercase">AI Beauty Try-On Plugin</h2>
            <p class="text-2xl font-bold mb-12 text-gray-800 leading-relaxed">準備好開始您的<br>美妝體驗了嗎？</p>
            <button id="init-btn" class="btn-primary text-white px-10 py-4 rounded-full text-lg font-bold shadow-lg mb-6">
                開啟鏡頭並開始試妝
            </button>
            <p class="text-gray-400 text-sm">* 點擊即表示允許瀏覽器存取攝影機</p>
        </div>

        <header class="p-5 text-center bg-[#FAF5F9]">
            <h1 class="text-sm font-bold tracking-[0.2em] uppercase text-[#333]">AI Beauty Try-On Plugin</h1>
            <div class="h-px w-8 bg-[#E950A0] mx-auto mt-2 opacity-30"></div>
            <p class="text-[9px] text-[#E950A0] mt-2 tracking-[0.2em] uppercase font-bold italic">Smart Analysis System</p>
        </header>

        <main id="app-content" class="flex-grow px-6 opacity-0 transition-opacity duration-1000 overflow-y-auto pb-10">
            <div class="vto-container mt-4 relative border border-pink-50">
                <div id="loading-overlay" class="absolute inset-0 z-50 bg-white/90 flex flex-col items-center justify-center">
                    <div class="w-8 h-8 border-2 border-pink-100 border-t-[#E950A0] rounded-full animate-spin"></div>
                    <p class="text-[10px] mt-4 tracking-widest text-[#E950A0] font-bold uppercase">AI Scanning...</p>
                </div>

                <div id="scan-bar" class="scan-line z-20"></div>

                <video id="video-element" class="mirror" playsinline muted autoplay></video>
                <canvas id="output-canvas" class="mirror"></canvas>

                <!-- 浮動 AI 分析按鈕 -->
                <div class="absolute top-4 right-4 z-30">
                    <button id="ai-analyze-btn" class="bg-white/90 backdrop-blur-md p-3 rounded-full shadow-lg border border-pink-100 flex items-center justify-center group active:scale-90 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#E950A0] group-hover:rotate-12 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
                        </svg>
                        <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 ease-in-out text-[10px] font-bold ml-2 text-[#E950A0]">AI 智慧分析推薦</span>
                    </button>
                </div>

                <div class="absolute bottom-6 left-6 right-6 flex justify-between items-center z-10">
                    <button id="compare-btn" class="w-10 h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-[#333] text-[9px] shadow-sm border border-white active:scale-95 transition">對比</button>
                    <button id="capture-btn" class="w-14 h-14 bg-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition border border-pink-50">
                        <div class="w-11 h-11 rounded-full border border-pink-50 bg-[#FAF5F9] flex items-center justify-center">
                            <div class="w-4 h-4 rounded-full bg-[#E950A0] opacity-20"></div>
                        </div>
                    </button>
                    <button id="guide-toggle" class="w-10 h-10 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center text-[#333] text-[9px] shadow-sm border border-white active:scale-95 transition">比例</button>
                </div>
            </div>

            <!-- 分析報告展示 -->
            <div id="ai-result-panel" class="hidden mt-6 p-4 bg-pink-50/50 rounded-2xl border border-pink-100">
                <div class="flex items-start mb-2">
                    <div class="p-2 bg-white rounded-lg mr-3 shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#E950A0]" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div class="flex-grow">
                        <h4 class="text-xs font-bold text-gray-800">AI 智能分析報告</h4>
                        <p id="ai-analysis-text" class="text-[10px] text-gray-500 mt-1 leading-relaxed">正在解析...</p>
                    </div>
                </div>
            </div>

            <!-- 選單標籤 -->
            <div class="mt-6">
                <div class="flex space-x-5 mb-5 text-gray-400 text-[10px] tracking-widest overflow-x-auto no-scrollbar border-b border-gray-100">
                    <button onclick="changeUIMode('color')" id="tab-color" class="pb-2 active-tab whitespace-nowrap uppercase">色號選購</button>
                    <button onclick="changeUIMode('base')" id="tab-base" class="pb-2 whitespace-nowrap uppercase">底妝質感</button>
                    <button onclick="changeUIMode('eye')" id="tab-eye" class="pb-2 whitespace-nowrap uppercase">眼影效果</button>
                    <button onclick="changeUIMode('shape')" id="tab-shape" class="pb-2 whitespace-nowrap uppercase">唇形修飾</button>
                </div>

                <div class="min-h-[140px]">
                    <div id="color-panel" class="block">
                        <div class="flex space-x-4 overflow-x-auto pb-4 no-scrollbar" id="look-selector"></div>
                    </div>
                    <div id="base-panel" class="hidden">
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setBaseStyle('natural')" id="base-natural" class="option-btn active uppercase">輕透原生</button>
                            <button onclick="setBaseStyle('matte')" id="base-matte" class="option-btn uppercase">絲絨柔霧</button>
                            <button onclick="setBaseStyle('glow')" id="base-glow" class="option-btn uppercase">貴婦水光</button>
                        </div>
                    </div>
                    <div id="eye-panel" class="hidden">
                        <div class="grid grid-cols-3 gap-2">
                            <button onclick="setEyeStyle('daily')" id="eye-daily" class="option-btn active uppercase">日常深邃</button>
                            <button onclick="setEyeStyle('rose')" id="eye-rose" class="option-btn uppercase">燕麥玫瑰</button>
                            <button onclick="setEyeStyle('tea')" id="eye-tea" class="option-btn uppercase">炭焙拿鐵</button>
                        </div>
                    </div>
                    <div id="shape-panel" class="hidden">
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="setLipShape('natural')" id="shape-natural" class="option-btn active uppercase">原生唇形</button>
                            <button onclick="setLipShape('plump')" id="shape-plump" class="option-btn uppercase">豐盈飽滿</button>
                            <button onclick="setLipShape('slim')" id="shape-slim" class="option-btn uppercase">清秀精緻</button>
                            <button onclick="setLipShape('m-shape')" id="shape-m-shape" class="option-btn uppercase">Ｍ字微笑</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-6 pt-2 bg-white border-t border-gray-50">
            <button class="w-full bg-[#E950A0] text-white py-4 rounded-xl font-bold text-[11px] tracking-[0.3em] uppercase shadow-lg shadow-pink-100">
                加入購物清單
            </button>
        </footer>
    </div>

    <script>
        const videoElement = document.getElementById('video-element');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingOverlay = document.getElementById('loading-overlay');
        const startScreen = document.getElementById('start-screen');
        const appContent = document.getElementById('app-content');
        const initBtn = document.getElementById('init-btn');
        const compareBtn = document.getElementById('compare-btn');
        const analyzeBtn = document.getElementById('ai-analyze-btn');
        const scanBar = document.getElementById('scan-bar');
        const aiPanel = document.getElementById('ai-result-panel');
        const aiText = document.getElementById('ai-analysis-text');

        const apiKey = "AIzaSyBOU_xg5paoqpoHpWjC3yF5bcSsO41iNfE"; 

        let currentLipShape = 'natural', currentBaseStyle = 'natural', currentEyeStyle = 'daily';
        let showMakeup = true, showGuides = false;
        
        const looks = [
            { id: 'ginger', name: '01 柔薑', lip: '#A95842', eye: '#8B6A5A', blush: '#D5A893' },
            { id: 'rose', name: '02 燕麥玫瑰', lip: '#B25F60', eye: '#967A7A', blush: '#C89B9B' },
            { id: 'nut', name: '03 烤栗子', lip: '#8B4232', eye: '#7A5E4E', blush: '#B88F7F' },
            { id: 'tea', name: '04 肉桂奶茶', lip: '#B26D57', eye: '#917869', blush: '#D2AF9D' },
            { id: 'berry', name: '05 煙燻莓果', lip: '#8E4B56', eye: '#7A646E', blush: '#B78F98' },
            { id: 'honey', name: '06 蜜糖橘', lip: '#C26949', eye: '#A68364', blush: '#E5B198' },
            { id: 'cocoa', name: '07 慕斯可可', lip: '#6D3D32', eye: '#665248', blush: '#A38475' }
        ];
        let activeLook = looks[0];

        const UPPER_LIP = [61, 185, 40, 39, 37, 0, 267, 269, 270, 409, 291, 308, 415, 310, 311, 312, 13, 82, 81, 80, 191, 78];
        const LOWER_LIP = [61, 146, 91, 181, 84, 17, 314, 405, 321, 375, 291, 308, 324, 318, 402, 317, 14, 87, 178, 88, 95, 78];
        const FACE_OVAL = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400, 377, 152, 148, 176, 149, 150, 136, 172, 58, 132, 93, 234, 127, 162, 21, 54, 103, 67, 109];

        function tryExtractJson(text) {
            try { return JSON.parse(text); } catch (e) {
                const match = text.match(/\{[\s\S]*\}/);
                if (match) {
                    try { return JSON.parse(match[0]); } catch (e2) { return null; }
                }
                return null;
            }
        }

        async function performAIAnalysis() {
            try {
                analyzeBtn.disabled = true;
                scanBar.style.display = 'block';
                aiPanel.classList.remove('hidden');
                aiText.innerText = "智慧分析推薦中，請稍候...";

                // 擷取畫面並壓縮
                const targetWidth = 400;
                const scale = targetWidth / videoElement.videoWidth;
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = targetWidth;
                tempCanvas.height = videoElement.videoHeight * scale;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
                const base64Image = tempCanvas.toDataURL('image/jpeg', 0.5).split(',')[1];

                const systemPrompt = `You are a professional makeup AI. Analyze the skin tone and face shape of the user.
                Pick ONE ideal color from this list: ${JSON.stringify(looks.map(l => ({id: l.id, name: l.name})))} stably.
                Return ONLY a JSON object with these keys: skin_tone, face_shape, recommended_id, advice.`;

                const userQuery = "Please analyze my face features and recommend a makeup look.";

                let retries = 0;
                let finalData = null;
                
                while (retries < 3 && !finalData) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                contents: [{ parts: [ { text: userQuery }, { inlineData: { mimeType: "image/jpeg", data: base64Image } } ] }],
                                generationConfig: { 
                                    responseMimeType: "application/json",
                                    temperature: 0.1,
                                    maxOutputTokens: 300
                                }
                            })
                        });
                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) {
                            finalData = tryExtractJson(text);
                            if (finalData) break;
                        }
                    } catch (e) {
                        retries++;
                        await new Promise(r => setTimeout(r, 1000 * retries));
                    }
                }

                if (!finalData) throw new Error("API 解析異常");

                const recommendedLook = looks.find(l => l.id === finalData.recommended_id) || looks[0];
                selectLook(recommendedLook);
                
                aiText.innerHTML = `<strong>${finalData.skin_tone}</strong> | 臉型：${finalData.face_shape}<br>建議：${finalData.advice}<br><span class="text-[#E950A0] font-bold">為您推薦：${recommendedLook.name}</span>`;

            } catch (error) {
                console.error("Analysis Failed:", error);
                aiText.innerText = "分析失敗，請正對攝像頭並確保光線充足再試一次。";
            } finally {
                scanBar.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        }

        analyzeBtn.addEventListener('click', performAIAnalysis);

        function selectLook(look) {
            activeLook = look;
            document.querySelectorAll('.swatch-item').forEach(el => {
                const name = el.querySelector('p').innerText;
                el.classList.toggle('active', name === look.name);
            });
        }

        // --- MediaPipe 渲染邏輯 ---
        function onResults(results) {
            if (loadingOverlay.style.opacity !== '0') {
                loadingOverlay.style.opacity = '0';
                setTimeout(() => loadingOverlay.style.display = 'none', 500);
            }
            if (videoElement.videoWidth > 0) {
                if (canvasElement.width !== videoElement.videoWidth || canvasElement.height !== videoElement.videoHeight) {
                    canvasElement.width = videoElement.videoWidth;
                    canvasElement.height = videoElement.videoHeight;
                }
            }
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (showMakeup && results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];
                drawBaseMakeup(landmarks, currentBaseStyle);
                const eyeColor = currentEyeStyle === 'rose' ? '#A68A8A' : (currentEyeStyle === 'tea' ? '#8C7665' : activeLook.eye);
                drawNaturalLayer(landmarks, [226, 247, 30, 29, 27, 28, 56, 190, 243], eyeColor, 0.45, 12, 'multiply');
                drawNaturalLayer(landmarks, [463, 414, 286, 258, 257, 259, 260, 467, 446], eyeColor, 0.45, 12, 'multiply');
                drawHemeBlush(landmarks, activeLook.blush);
                drawReshapedLips(landmarks, activeLook.lip);
                if (showGuides) drawProportionGuides(landmarks);
            }
            canvasCtx.restore();
        }

        function drawBaseMakeup(landmarks, style) {
            if (style === 'natural') return;
            canvasCtx.save();
            const ovalPoints = FACE_OVAL.map(idx => landmarks[idx]);
            if (style === 'matte') {
                canvasCtx.globalCompositeOperation = 'multiply'; canvasCtx.globalAlpha = 0.08; canvasCtx.fillStyle = '#F5E3D5';
                canvasCtx.beginPath(); canvasCtx.moveTo(ovalPoints[0].x * canvasElement.width, ovalPoints[0].y * canvasElement.height);
                ovalPoints.forEach(p => canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height)); canvasCtx.fill();
            } else if (style === 'glow') {
                [1, 4, 168].forEach(idx => {
                    const pt = landmarks[idx];
                    const grad = canvasCtx.createRadialGradient(pt.x * canvasElement.width, pt.y * canvasElement.height, 0, pt.x * canvasElement.width, pt.y * canvasElement.height, 40);
                    grad.addColorStop(0, 'rgba(255, 255, 255, 0.15)'); grad.addColorStop(1, 'transparent');
                    canvasCtx.fillStyle = grad; canvasCtx.globalCompositeOperation = 'screen';
                    canvasCtx.beginPath(); canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 40, 0, Math.PI * 2); canvasCtx.fill();
                });
            }
            canvasCtx.restore();
        }

        function drawReshapedLips(landmarks, color) {
            const getPoints = (indices) => indices.map(idx => {
                let p = { ...landmarks[idx] };
                const centerX = landmarks[13].x, centerY = (landmarks[13].y + landmarks[14].y) / 2;
                if (currentLipShape === 'plump') { p.x += (p.x - centerX) * 0.12; p.y += (p.y - centerY) * 0.12; }
                else if (currentLipShape === 'slim') { p.x -= (p.x - centerX) * 0.08; p.y -= (p.y - centerY) * 0.08; }
                else if (currentLipShape === 'm-shape') { if ([37, 0, 267].includes(idx)) p.y -= 0.005; if ([61, 291].includes(idx)) p.y -= 0.003; }
                return p;
            });
            const upper = getPoints(UPPER_LIP), lower = getPoints(LOWER_LIP);
            drawPath(upper, color, 0.4, 8, 'multiply');
            drawPath(lower, color, 0.4, 8, 'multiply');
        }

        function drawPath(points, color, alpha, blur, composite) {
            canvasCtx.save(); canvasCtx.globalCompositeOperation = composite; canvasCtx.globalAlpha = alpha;
            canvasCtx.filter = `blur(${blur}px)`; canvasCtx.fillStyle = color;
            canvasCtx.beginPath(); canvasCtx.moveTo(points[0].x * canvasElement.width, points[0].y * canvasElement.height);
            points.forEach(p => canvasCtx.lineTo(p.x * canvasElement.width, p.y * canvasElement.height));
            canvasCtx.closePath(); canvasCtx.fill(); canvasCtx.restore();
        }

        function drawNaturalLayer(landmarks, indices, color, alpha, blur, composite) {
            const points = indices.map(i => landmarks[i]); drawPath(points, color, alpha, blur, composite);
        }

        function drawHemeBlush(landmarks, color) {
            [landmarks[205], landmarks[425]].forEach(pt => {
                canvasCtx.save(); canvasCtx.globalCompositeOperation = 'multiply'; canvasCtx.globalAlpha = 0.45; 
                canvasCtx.filter = 'blur(25px)';
                const grad = canvasCtx.createRadialGradient(pt.x * canvasElement.width, pt.y * canvasElement.height, 0, pt.x * canvasElement.width, pt.y * canvasElement.height, 50);
                grad.addColorStop(0, color); grad.addColorStop(1, 'transparent');
                canvasCtx.fillStyle = grad;
                canvasCtx.beginPath(); canvasCtx.arc(pt.x * canvasElement.width, pt.y * canvasElement.height, 50, 0, Math.PI * 2); canvasCtx.fill();
                canvasCtx.restore();
            });
        }

        function drawProportionGuides(landmarks) {
            canvasCtx.strokeStyle = '#E950A0'; canvasCtx.lineWidth = 0.8; canvasCtx.setLineDash([5, 5]);
            const lines = [landmarks[10].y, landmarks[168].y, landmarks[2].y, landmarks[152].y];
            lines.forEach(y => { canvasCtx.beginPath(); canvasCtx.moveTo(canvasElement.width * 0.2, y * canvasElement.height); canvasCtx.lineTo(canvasElement.width * 0.8, y * canvasElement.height); canvasCtx.stroke(); });
        }

        initBtn.addEventListener('click', () => {
            startScreen.style.opacity = '0';
            appContent.style.opacity = '1';
            setTimeout(() => { startScreen.style.display = 'none'; startCamera(); }, 700);
        });

        function startCamera() {
            const faceMesh = new FaceMesh({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
            faceMesh.setOptions({ refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
            faceMesh.onResults(onResults);
            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({ image: videoElement }); },
                width: 640, height: 480, facingMode: 'user'
            });
            camera.start();
        }

        function changeUIMode(mode) {
            ['color', 'base', 'eye', 'shape'].forEach(m => {
                const el = document.getElementById(`${m}-panel`);
                if (el) el.style.display = m === mode ? 'block' : 'none';
                const tab = document.getElementById(`tab-${m}`);
                if (tab) tab.classList.toggle('active-tab', m === mode);
            });
        }

        function setBaseStyle(style) {
            currentBaseStyle = style;
            document.querySelectorAll('#base-panel .option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`base-${style}`).classList.add('active');
        }

        function setEyeStyle(style) {
            currentEyeStyle = style;
            document.querySelectorAll('#eye-panel .option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`eye-${style}`).classList.add('active');
        }

        function setLipShape(shape) {
            currentLipShape = shape;
            document.querySelectorAll('#shape-panel .option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`shape-${shape}`).classList.add('active');
        }

        function initUI() {
            const container = document.getElementById('look-selector');
            looks.forEach(look => {
                const item = document.createElement('div');
                item.className = `flex-shrink-0 cursor-pointer text-center swatch-item ${activeLook.id === look.id ? 'active' : ''}`;
                item.onclick = () => selectLook(look);
                item.innerHTML = `<div class="w-14 h-14 rounded-full border border-pink-100 shadow-sm mb-2 swatch-circle mx-auto" style="background: linear-gradient(135deg, ${look.lip} 40%, ${look.eye} 100%)"></div><p class="text-[9px] font-bold text-gray-700">${look.name}</p>`;
                container.appendChild(item);
            });
        }

        compareBtn.addEventListener('mousedown', () => showMakeup = false);
        compareBtn.addEventListener('mouseup', () => showMakeup = true);
        compareBtn.addEventListener('touchstart', (e) => { e.preventDefault(); showMakeup = false; });
        compareBtn.addEventListener('touchend', () => showMakeup = true);
        document.getElementById('guide-toggle').addEventListener('click', () => { showGuides = !showGuides; });
        
        initUI();
    </script>
</body>
</html>
